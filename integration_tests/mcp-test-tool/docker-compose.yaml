version: "3.9"

services:
  fastmcp:
    build: .
    container_name: fastmcp-server

    ports:
      - "8082:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - FASTMCP_LOG_LEVEL=debug
    volumes:
      - .:/app
    networks:
        - mcp-network
networks:
  mcp-network:
    driver: bridge
    external: true