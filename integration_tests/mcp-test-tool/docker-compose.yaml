version: "3.9"

services:
  fastmcp:
    build: .
    container_name: fastmcp
    ports:
      - "8082:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - FASTMCP_LOG_LEVEL=debug
    networks:
      mcp-network:
        aliases:
          - fastmcp
networks:
  mcp-network:
    driver: bridge
    external: true