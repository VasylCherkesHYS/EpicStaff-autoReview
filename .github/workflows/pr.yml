name: PR build

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-cla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLA signatures from main
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: signatures/cla.json
          sparse-checkout-cone-mode: false

      - name: Verify PR author signed the CLA
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          if jq -e --arg a "$AUTHOR" '.signedContributors[]? | select(.name == $a)' signatures/cla.json > /dev/null; then
            echo "$AUTHOR has signed the CLA — proceeding with build."
          else
            echo "::error::$AUTHOR has not signed the CLA. Build will not run until the CLA is signed."
            exit 1
          fi

  build:
    needs: check-cla
    uses: ./.github/workflows/compose-build.yml
    with:
      compose-file: src/docker-compose.yaml
      max-parallel: 2