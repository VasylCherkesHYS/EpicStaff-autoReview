  installer-linux:
    runs-on: ubuntu-latest
    if: ${{ inputs.installer_job != 'skip' }}
    
    outputs:
      artifact-name: ${{ steps.build-info.outputs.artifact-name }}
      executable-size: ${{ steps.build-info.outputs.executable-size }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # No Docker registry needed for local builds!
      
      - name: Check if build needed
        id: check-changes
        if: ${{ inputs.installer_job == 'auto' }}
        uses: dorny/paths-filter@v2
        with:
          filters: |
            installer:
              - 'installer/**/*'
              - 'src/**/*'
              - 'frontend-config/**/*'
              - '.github/workflows/installer.yml'

      - name: Generate version info
        id: version-info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          VERSION="v${{ github.run_number }}-${SHORT_SHA}"
          
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Linux installer
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        run: |
          set -e  # Exit on any error
          
          echo "🚀 Starting Linux installer build..."
          echo "Version: ${{ steps.version-info.outputs.version }}"
          
          # Create artifacts directory
          mkdir -p artifacts/linux
          echo "📁 Created artifacts directory"
          
          # Generate unique names to avoid conflicts
          IMAGE_NAME="epicstaff-installer:${{ steps.version-info.outputs.version }}"
          CONTAINER_NAME="epicstaff-installer-${{ github.run_id }}-${{ steps.version-info.outputs.short-sha }}"
          
          echo "🏗️ Building Docker image: ${IMAGE_NAME}"
          
          # Build the Docker image with proper context
          if ! docker build -t "${IMAGE_NAME}" -f installer/Dockerfile.installer .; then
            echo "❌ Docker build failed"
            exit 1
          fi
          
          echo "✅ Docker image built successfully"
          
          # Show what's in the image's /out directory
          echo "🔍 Checking contents of /out directory in image:"
          docker run --rm "${IMAGE_NAME}" ls -la /out/ || true
          
          # Create container and extract artifacts
          echo "📦 Creating container: ${CONTAINER_NAME}"
          docker create --name "${CONTAINER_NAME}" "${IMAGE_NAME}"
          
          # Copy all contents from /out directory
          echo "📋 Copying artifacts from container..."
          if ! docker cp "${CONTAINER_NAME}:/out/." artifacts/linux/; then
            echo "❌ Failed to copy artifacts from container"
            # Show what's actually in the container
            docker run --rm "${IMAGE_NAME}" find /out -type f -exec ls -la {} \;
            docker rm -f "${CONTAINER_NAME}" 2>/dev/null || true
            docker rmi "${IMAGE_NAME}" 2>/dev/null || true
            exit 1
          fi
          
          echo "📄 Contents copied to artifacts/linux/:"
          ls -la artifacts/linux/
          
          
          # Verify we have the expected executable
          if [ -f "artifacts/linux/epicstaff" ]; then
            EXEC_SIZE=$(stat -c%s "artifacts/linux/epicstaff")
            echo "🎉 Found executable: epicstaff (${EXEC_SIZE} bytes)"
            
            # Make it executable and create versioned copy
            chmod +x artifacts/linux/epicstaff
            cp artifacts/linux/epicstaff "artifacts/linux/epicstaff-${{ steps.version-info.outputs.version }}"
            
            # Create checksums
            cd artifacts/linux
            sha256sum epicstaff > epicstaff.sha256
            sha256sum "epicstaff-${{ steps.version-info.outputs.version }}" > "epicstaff-${{ steps.version-info.outputs.version }}.sha256"
            cd ../..
            
            echo "📝 Created checksums and versioned copy"
            
          else
            echo "❌ No executable found in artifacts"
            echo "Available files:"
            find artifacts/linux -type f -exec ls -la {} \; 2>/dev/null || true
            docker rm -f "${CONTAINER_NAME}" 2>/dev/null || true
            docker rmi "${IMAGE_NAME}" 2>/dev/null || true
            exit 1
          fi
          
          # Cleanup Docker resources
          echo "🧹 Cleaning up Docker resources..."
          docker rm -f "${CONTAINER_NAME}" 2>/dev/null || true
          docker rmi "${IMAGE_NAME}" 2>/dev/null || true
          
          echo "✅ Build completed successfully!"

      - name: Test executable
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        run: |
          if [ -f "artifacts/linux/epicstaff" ]; then
            echo "🧪 Testing executable..."
            
            # Check if it's a valid ELF binary
            FILE_TYPE=$(file artifacts/linux/epicstaff)
            echo "📋 File type: ${FILE_TYPE}"
            
            if echo "${FILE_TYPE}" | grep -q "ELF.*executable"; then
              echo "✅ Executable is a valid ELF binary"
            else
              echo "❌ Executable is not a valid ELF binary"
              exit 1
            fi
            
            # Check permissions
            if [ -x "artifacts/linux/epicstaff" ]; then
              echo "✅ Executable has proper permissions"
            else
              echo "❌ Executable doesn't have execute permissions"
              exit 1
            fi
            
            # Show dependencies
            echo "🔗 Dynamic dependencies:"
            ldd artifacts/linux/epicstaff 2>/dev/null || echo "Static binary or ldd failed"
            
            echo "✅ Executable tests passed!"
          else
            echo "❌ Executable not found for testing"
            exit 1
          fi

      - name: Set build info
        id: build-info
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        run: |
          if [ -f "artifacts/linux/epicstaff" ]; then
            EXEC_SIZE=$(stat -c%s "artifacts/linux/epicstaff")
            EXEC_SHA=$(cat artifacts/linux/epicstaff.sha256 | cut -d' ' -f1)
            echo "artifact-name=epicstaff-${{ steps.version-info.outputs.version }}" >> $GITHUB_OUTPUT
            echo "executable-size=${EXEC_SIZE}" >> $GITHUB_OUTPUT
            echo "executable-sha256=${EXEC_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Linux artifacts
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: epicstaff-linux-${{ steps.version-info.outputs.version }}
          path: |
            artifacts/linux/epicstaff
            artifacts/linux/epicstaff-${{ steps.version-info.outputs.version }}
            artifacts/linux/*.sha256
          retention-days: 7
          if-no-files-found: error

      - name: Build summary
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        run: |
          echo "📊 Build Summary"
          echo "=================="
          echo "🏷️  Version: ${{ steps.version-info.outputs.version }}"
          echo "📦 Artifact: ${{ steps.build-info.outputs.artifact-name }}"
          echo "📏 Size: $(( ${{ steps.build-info.outputs.executable-size }} / 1024 / 1024 )) MB"
          echo "🔐 SHA256: ${{ steps.build-info.outputs.executable-sha256 }}"
          echo "🐧 Platform: Linux x86_64"
          echo "🔗 Download URL will be available in the Actions artifacts section"
          
          # Also add to job summary
          echo "# 🐧 Linux Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version-info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(( ${{ steps.build-info.outputs.executable-size }} / 1024 / 1024 )) MB" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256:** \`${{ steps.build-info.outputs.executable-sha256 }}\`" >> $GITHUB_STEP_SUMMARY

  check-artifacts:
    runs-on: ubuntu-latest
    needs: [installer-windows, installer-linux]
    if: always()
    outputs:
      artifacts-exist: ${{ steps.check.outputs.exist }}
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Check if artifacts exist
        id: check
        run: |
          echo "Checking for installer artifacts..."
          FOUND_ARTIFACTS=false
          
          # Check for actual installer files in each platform directory
          for platform in windows; do
            artifact_dir="artifacts/${platform}-installer"
            if [ -d "$artifact_dir" ]; then
              echo "Found $artifact_dir directory"
              ls -la "$artifact_dir/"
              
              case $platform in
                linux)
                  if [ -f "$artifact_dir/epicstaff.app" ]; then
                    echo "Found Linux installer: $artifact_dir/epicstaff.app"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
                windows)
                  if [ -f "$artifact_dir/epicstaff.exe" ]; then
                    echo "Found Windows installer: $artifact_dir/epicstaff.exe"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
                macos)
                  if [ -d "$artifact_dir/epicstaff.app" ] || [ -f "$artifact_dir/epicstaff.app" ]; then
                    echo "Found macOS installer: $artifact_dir/epicstaff.app"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
              esac
            fi
          done
          
          echo "exist=$FOUND_ARTIFACTS" >> $GITHUB_OUTPUT
          
          if [ "$FOUND_ARTIFACTS" = "true" ]; then
            echo "Installer artifacts found"
          else
            echo "No installer artifacts found"
          fi