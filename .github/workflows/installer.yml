  installer-windows:
    runs-on: windows-latest
    if: ${{ inputs.installer_job != 'skip' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~\AppData\Local\pip\Cache
            installer\.venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: Check if build needed
        id: check-changes
        if: ${{ inputs.installer_job == 'auto' }}
        uses: dorny/paths-filter@v2
        with:
          filters: |
            installer:
              - 'installer/**/*'
              - '.github/workflows/installer.yml'

      - name: Build Windows installer
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        shell: cmd
        run: |
          echo Job started
          mkdir artifacts\windows
          cd installer
          python -m venv .venv
          .venv\Scripts\activate
          pip install poetry
          poetry install --no-root
          pyinstaller installer.py --name epicstaff.exe --onefile --add-data "app/templates:app/templates" --add-data "app/static:app/static" --add-data "../src/docker-compose.yaml:app/static/run_program" --add-data "../frontend-config:app/static/run_program/frontend-config" --add-data "../src/.env:app/static/run_program" --hidden-import engineio.async_drivers.threading --distpath ../artifacts/windows --windowed
          deactivate
          echo Build complete. Binary should be in artifacts/windows/epicstaff.exe

      - name: Upload Windows artifacts
        if: ${{ inputs.installer_job == 'force' || (inputs.installer_job == 'auto' && steps.check-changes.outputs.installer == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows/
          retention-days: 7

