name: Create Release

on:
  workflow_call:
    inputs:
      push_github:
        required: true
        type: string

jobs:
  create-tag:
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
      dev-tag: ${{ steps.create-tag.outputs.dev-tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        id: create-tag
        run: |
          CURRENT_YEAR=$(date +%Y)
          YEAR_SINCE_START=$((CURRENT_YEAR - 2024))
          MONTH=$(date +%m)
          MONTH=$(echo $MONTH | sed 's/^0*//')
          TAG_NAME="v0.${YEAR_SINCE_START}.${MONTH}${{ github.run_number }}"
          DEV_TAG="${TAG_NAME}-dev"
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "dev-tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "Created tag $TAG_NAME"
          echo "Created dev tag $DEV_TAG"

  check-artifacts:
    runs-on: ubuntu-latest
    outputs:
      artifacts-exist: ${{ steps.check.outputs.exist }}
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Check if artifacts exist
        id: check
        run: |
          echo "Checking for installer artifacts..."
          FOUND_ARTIFACTS=false
          
          # Check for actual installer files in each platform directory
          for platform in linux windows macos; do
            artifact_dir="artifacts/${platform}-installer"
            if [ -d "$artifact_dir" ]; then
              echo "Found $artifact_dir directory"
              ls -la "$artifact_dir/" || true
              
              case $platform in
                linux)
                  if find "$artifact_dir" -name "epicstaff.app" -type f | grep -q .; then
                    echo "Found Linux installer in $artifact_dir"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
                windows)
                  if find "$artifact_dir" -name "epicstaff.exe" -type f | grep -q .; then
                    echo "Found Windows installer in $artifact_dir"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
                macos)
                  if find "$artifact_dir" -name "epicstaff.app" \( -type f -o -type d \) | grep -q .; then
                    echo "Found macOS installer in $artifact_dir"
                    FOUND_ARTIFACTS=true
                  fi
                  ;;
              esac
            fi
          done
          
          echo "exist=$FOUND_ARTIFACTS" >> $GITHUB_OUTPUT
          
          if [ "$FOUND_ARTIFACTS" = "true" ]; then
            echo "Installer artifacts found"
          else
            echo "No installer artifacts found"
          fi

  create-release:
    runs-on: self-hosted
    needs: [create-tag, check-artifacts]
    if: ${{ github.ref == 'refs/heads/Dev' && needs.check-artifacts.outputs.artifacts-exist == 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        id: create-archives
        run: |
          echo "Creating release archives from installer artifacts..."
          mkdir -p release-archives
          
          # Create Linux archive
          echo "Creating Linux archive..."
          linux_dir="artifacts/linux-installer"
          if [ -d "$linux_dir" ] && find "$linux_dir" -name "epicstaff.app" -type f | grep -q .; then
            cd "$linux_dir"
            tar -czf "../../release-archives/linux-epicstaff.tar.gz" epicstaff.app
            cd ../..
            echo "Created Linux archive"
          fi
          
          # Create Windows archive
          echo "Creating Windows archive..."
          windows_dir="artifacts/windows-installer"
          if [ -d "$windows_dir" ] && find "$windows_dir" -name "epicstaff.exe" -type f | grep -q .; then
            cd "$windows_dir"
            zip "../../release-archives/windows-epicstaff.zip" epicstaff.exe
            cd ../..
            echo "Created Windows archive"
          fi
          
          # Create macOS archive
          echo "Creating macOS archive..."
          macos_dir="artifacts/macos-installer"
          if [ -d "$macos_dir" ] && find "$macos_dir" -name "epicstaff.app" \( -type f -o -type d \) | grep -q .; then
            cd "$macos_dir"
            tar -czf "../../release-archives/macos-epicstaff.tar.gz" epicstaff.app
            cd ../..
            echo "Created macOS archive"
          fi
          
          echo "Available release archives:"
          ls -la release-archives/ || echo "No archives created"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-tag.outputs.dev-tag }}
          name: "Development Release ${{ needs.create-tag.outputs.dev-tag }}"
          body: |
            Automated development release from GitHub Actions
            
            **Commit:** ${{ github.event.head_commit.message }}
            **SHA:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
          files: release-archives/*
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: release-archives/
          retention-days: 30