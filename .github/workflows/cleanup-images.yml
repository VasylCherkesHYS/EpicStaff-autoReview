name: cleanup-images

on:
  schedule:
    - cron: "0 4 * * 0"  # Sunday 04:00 UTC
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually delete versions? Leave false to dry-run (logs what would be deleted)."
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  ORG: epicstaff
  # Scheduled runs apply; manual runs honor the workflow_dispatch input.
  # Flip this to 'false' if you want scheduled runs to also stay dry-run.
  SCHEDULED_APPLY: "true"

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"

      - name: Install deps
        run: pip install requests

      - name: Prune ghcr packages
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_APPLY: ${{ github.event.inputs.apply }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ]; then
            APPLY="$SCHEDULED_APPLY"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            APPLY="$INPUT_APPLY"
          else
            APPLY="false"
          fi

          ARGS=(
            --org "$ORG"
            --package django_app
            --package crew
            --package crewdb
            --package manager
            --package realtime
            --package knowledge
            --package sandbox
            --package code
            --package webhook
            --package frontend
          )

          if [ "$APPLY" = "true" ]; then
            echo ">> APPLY mode: deletions will be performed"
            ARGS+=(--apply)
          else
            echo ">> DRY-RUN mode: no deletions, only logging"
          fi

          python ./.github/scripts/cleanup_ghcr.py "${ARGS[@]}"
