# docker-compose.dev.yaml

include:
  - docker-compose.base.yaml

services:
  django_app:
    command: sh -lc "
      python manage.py check_db_init &&
      python manage.py migrate &&
      python manage.py fix_sequences &&
      python manage.py upload_models &&
      python manage.py collectstatic --noinput &&
      python manage.py listen_redis &
      python manage.py cache_redis &
      uvicorn django_app.asgi:application --host 0.0.0.0 --port ${DJANGO_PORT:-8000} --reload --reload-dir /home/user/root/app/django_app"
    ports:
      - "${DJANGO_PORT:-8000}:${DJANGO_PORT:-8000}"
    environment:
      GUNICORN_RELOAD: 1
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      # Добавляем локальные папки к тем, что уже описаны в base.yaml
      - ./django_app:/home/user/root/app/django_app:cached
      - ./shared:/home/user/root/app/shared:cached

  crewdb:
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"

  realtime:
    ports:
      - "${REALTIME_PORT:-8050}:${REALTIME_PORT:-8050}"

  manager:
    ports:
      - "${MANAGER_PORT:-8001}:${MANAGER_PORT:-8001}"
    env_file:
      - .env
      - ../dev/dev.env

  crew:
    command: >
      sh -lc "cd /home/user/root/app &&
      poetry run watchfiles
      --filter python
      'poetry run python3 /home/user/root/app/src/crew/main.py'
      /home/user/root/app/src/crew/"
    volumes:
      - ./crew/callbacks:/home/user/root/app/src/crew/callbacks:cached
      - ./crew/config:/home/user/root/app/src/crew/config:cached
      - ./crew/models:/home/user/root/app/src/crew/models:cached
      - ./crew/services:/home/user/root/app/src/crew/services:cached
      - ./crew/utils:/home/user/root/app/src/crew/utils:cached

  frontend:
    ports:
      - "${FRONTEND_PORT:-4201}:80"
    env_file:
      - ./.env
      - ../dev/dev.env

  webhook:
    ports:
      - "${WEBHOOK_PORT:-8051}:${WEBHOOK_PORT:-8051}"
    env_file:
      - ./.env
      - ../dev/dev.env