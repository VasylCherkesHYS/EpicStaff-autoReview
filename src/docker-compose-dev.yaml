#setup development env for autoreload
# ____________________________________________
# rewrite dev.env.example ro dev.env with your specific environment
#
# run docker compose with this env
# docker compose -f ./docker-compose-dev.yaml --env-file ./.env --env-file ../dev/dev.env up --build -d


# Shared environment for backend services

x-common-env: &common_env
  CODE_RESULT_CHANNEL: code_results
  CODE_EXEC_TASK_CHANNEL: code_exec_tasks
  SESSION_EVENT_UPDATE_CHANNEL: session:event:update
  SESSION_EVENT_CHANNEL: session:event
  SESSION_STATUS_CHANNEL: sessions:session_status
  MEMORY_UPDATE_CHANNEL: memory:update
  REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  DB_HOST_NAME: ${DB_HOST_NAME:-crewdb}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${POSTGRES_DB:-crew}

services:
  django_app:
    image: django_app
    build:
      context: .
      dockerfile: ./django_app/Dockerfile.dj
    command: sh -lc "
      python manage.py check_db_init &&
      python manage.py migrate &&
      python manage.py fix_sequences &&
      python manage.py upload_models &&
      python manage.py collectstatic --noinput &&
      python manage.py listen_redis &
      python manage.py cache_redis &
      uvicorn django_app.asgi:application --host 0.0.0.0 --port ${DJANGO_PORT:-8000} --reload --reload-dir /home/user/root/app/django_app"
    container_name: django_app
    ports:
      - "${DJANGO_PORT:-8000}:${DJANGO_PORT:-8000}"
    environment:
      <<: *common_env
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-unsafe-dev-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DB_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DJANGO_MEDIA_ROOT: ${MEDIA_ROOT}
      WEBHOOK_USE_TUNNEL: ${USE_TUNNEL}
      WEBHOOK_TUNNEL: ${WEBHOOK_TUNNEL}
      WEBHOOK_PORT: ${WEBHOOK_PORT}
      WEBHOOK_HOST_NAME: ${WEBHOOK_HOST_NAME}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      DJANGO_HOST: ${DJANGO_HOST:-localhost}
      DJANGO_PORT: ${DJANGO_PORT:-8000}
      GUNICORN_RELOAD: 1
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./django_app:/home/user/root/app/django_app:cached
      - ./shared:/home/user/root/app/shared:cached
      - crew_config:/home/user/root/app/env_config
      - media_data:/app/media

    networks:
      - backend-network
    depends_on:
      crewdb:
        condition: service_started
      redis:
        condition: service_healthy
  
    healthcheck:
      test: >
        sh -c 'curl -f http://${DJANGO_HOST:-localhost}:${DJANGO_PORT:-8000}/ht/ || exit 1'
      interval: 30s
      timeout: 10s
      retries: 12


  realtime:
    image: realtime
    container_name: realtime
    build:
      context: ./realtime
      dockerfile: Dockerfile.realtime
    ports:
      - "${REALTIME_PORT:-8050}:${REALTIME_PORT:-8050}"
    environment:
      <<: *common_env
      KNOWLEDGE_SEARCH_GET_CHANNEL: knowledge:search:get
      KNOWLEDGE_SEARCH_RESPONSE_CHANNEL: knowledge:search:response
      REALTIME_AGENTS_SCHEMA_CHANNEL: realtime_agents:schema
      REALTIME_PORT: ${REALTIME_PORT:-8050}
      MANAGER_HOST: ${MANAGER_HOST:-host.docker.internal}
      MANAGER_PORT: ${MANAGER_PORT}
      DB_REALTIME_USER: ${DB_REALTIME_USER}
      DB_REALTIME_PASSWORD: ${DB_REALTIME_PASSWORD}

    networks:
      - backend-network

    depends_on:
      crewdb:
        condition: service_healthy
      manager:
        condition: service_started
      redis:
        condition: service_healthy
      knowledge:
        condition: service_started
      django_app:
        condition: service_healthy

  manager:
    image: manager
    build:
      context: .
      dockerfile: ./manager/Dockerfile.man
    env_file:
      - .env
    container_name: manager_container
    ports:
      - "${MANAGER_PORT:-8001}:${MANAGER_PORT:-8001}"
    environment:
      <<: *common_env
      PULL_TOOL: ${PULL_TOOL}
      MANAGER_PORT: ${MANAGER_PORT:-8001}
      REDIS_HOST: ${REDIS_HOST:-redis}
      DB_MANAGER_USER: ${DB_MANAGER_USER}
      DB_MANAGER_PASSWORD: ${DB_MANAGER_PASSWORD}
      CREW_SAVEFILES_PATH: ${CREW_SAVEFILES_PATH}
    volumes:
      - ${DOCKER_SOCK_PATH}:${DOCKER_SOCK_PATH}
      - ${DOCKER_BIN_PATH}:${DOCKER_BIN_PATH}
    networks:
      - backend-network
    tty: true
    stdin_open: true
    depends_on:
      crewdb:
        condition: service_healthy
      redis:
        condition: service_healthy      

  crewdb:
    image: crewdb
    build:
      context: ./crewdb
      dockerfile: Dockerfile.crewdb
    container_name: crewdb
    command: ["postgres", "-c", "port=${DB_PORT:-5432}"]
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
      DB_MANAGER_USER: ${DB_MANAGER_USER}
      DB_MANAGER_PASSWORD: ${DB_MANAGER_PASSWORD}
      DB_KNOWLEDGE_USER: ${DB_KNOWLEDGE_USER}
      DB_KNOWLEDGE_PASSWORD: ${DB_KNOWLEDGE_PASSWORD}
      DB_REALTIME_USER: ${DB_REALTIME_USER}
      DB_REALTIME_PASSWORD: ${DB_REALTIME_PASSWORD}
      DB_CREW_USER: ${DB_CREW_USER}
      DB_CREW_PASSWORD: ${DB_CREW_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
      DJANGO_HOST: ${DJANGO_HOST}
      DJANGO_PORT: ${DJANGO_PORT:-8000}
    volumes:
      - crew_pgdata:${PGDATA}
    networks:
      - backend-network
    healthcheck:
      test: >
        bash -c '
          # Check if postgres is ready on custom port
          pg_isready -U postgres -p ${DB_PORT:-5432} || exit 1
          
          # Then check if users have been created
          /usr/local/bin/custom-docker-entrypoint.sh healthcheck-users
        '
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 15s


  redis:
    image: redis
    container_name: redis
    networks:
      - backend-network
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      sh -c "redis-server --port ${REDIS_PORT:-6379}
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}"
    healthcheck:
      test: >
        sh -c "redis-cli -p ${REDIS_PORT:-6378} ping || exit 1"
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  redis-monitor:
    image: redis-monitor
    build:
      context: .
      dockerfile: redis-monitor/Dockerfile.redis-monitor
    container_name: redis-monitor
    environment:
      <<: *common_env
      REDIS_HOST: ${REDIS_HOST:-redis}
      CHECK_INTERVAL: ${REDIS_CHECK_INTERVAL:-5}
      MAX_FAILURES: ${REDIS_MAX_FAILURES:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/mount/.env
    networks:
      - backend-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  crew:
    image: crew
    command: >
      sh -lc "cd /home/user/root/app &&
      poetry run watchfiles
      --filter python
      'poetry run python3 /home/user/root/app/src/crew/main.py'
      /home/user/root/app/src/crew/"
    build:
      context: .
      dockerfile: ./crew/Dockerfile.crew
    container_name: crew
    environment:
      <<: *common_env
      REDIS_PORT: ${REDIS_PORT:-6378}
      MANAGER_HOST: ${MANAGER_HOST}
      MANAGER_PORT: ${MANAGER_PORT:-8001}
      HAYSTACK_TELEMETRY_ENABLED: ${HAYSTACK_TELEMETRY_ENABLED}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY}
      EC_TELEMETRY: ${EC_TELEMETRY}
      MONITORING_MODE: ${MONITORING_MODE}
      DB_CREW_USER: ${DB_CREW_USER}
      DB_CREW_PASSWORD: ${DB_CREW_PASSWORD}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS}
    volumes:
      - ${DOCKER_SOCK_PATH}:${DOCKER_SOCK_PATH}
      - ${DOCKER_BIN_PATH}:${DOCKER_BIN_PATH}
      - crew_config:/home/user/root/app/env_config/
      - ./crew/callbacks:/home/user/root/app/src/crew/callbacks:cached
      - ./crew/config:/home/user/root/app/src/crew/config:cached

      - ./crew/models:/home/user/root/app/src/crew/models:cached
      - ./crew/config:/home/user/root/app/src/crew/config:cached
      - ./crew/services:/home/user/root/app/src/crew/services:cached
      - ./crew/utils:/home/user/root/app/src/crew/utils:cached
    networks:
      - backend-network
    tty: true
    stdin_open: true
    depends_on:
      crewdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sandbox:
    image: sandbox
    build:
      context: .
      dockerfile: ./sandbox/Dockerfile.sandbox
    container_name: sandbox
    environment:
      <<: *common_env
      BASE_VENV_PATH: ${BASE_VENV_PATH}
      OUTPUT_PATH: ${OUTPUT_PATH}
    volumes:
      - sandbox_venvs:${BASE_VENV_PATH}
      - sandbox_executions:${OUTPUT_PATH}
      - ${CREW_SAVEFILES_PATH}:${CONTAINER_SAVEFILES_PATH}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - backend-network
    tty: true
    stdin_open: true
    depends_on:
      - redis

  knowledge:
    image: knowledge
    build:
      context: ./knowledge
      dockerfile: Dockerfile.knowledge
    container_name: knowledge
    environment:
      <<: *common_env
      KNOWLEDGE_SOURCES_CHANNEL: knowledge_sources
      KNOWLEDGE_SEARCH_GET_CHANNEL: knowledge:search:get
      KNOWLEDGE_SEARCH_RESPONSE_CHANNEL: knowledge:search:response
      DB_KNOWLEDGE_USER: ${DB_KNOWLEDGE_USER}
      DB_KNOWLEDGE_PASSWORD: ${DB_KNOWLEDGE_PASSWORD}
    networks:
      - backend-network
    tty: true
    stdin_open: true
    depends_on:
      crewdb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile.fe
    container_name: epicstaff-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    env_file:
      - ./.env
      - ../dev/dev.env
    networks:
     - frontend-network
    volumes:
     - ../dev/dev.config.json:/usr/share/nginx/html/config.json
  
  webhook:
    image: webhook
    container_name: webhook
    build:
      context: .
      dockerfile: ./webhook/Dockerfile
    ports:
      - "${WEBHOOK_PORT:-8051}:${WEBHOOK_PORT:-8051}"
    env_file:
      - ./.env
      - ../dev/dev.env
    environment:
      <<: *common_env
      USE_TUNNEL: ${USE_TUNNEL}
      WEBHOOK_TUNNEL: ${WEBHOOK_TUNNEL}
      WEBHOOK_AUTH: ${WEBHOOK_AUTH}
      NGROK_DOMAIN: ${NGROK_DOMAIN}
      WEBHOOK_EMPTY_JSON_PATHS: ${WEBHOOK_EMPTY_JSON_PATHS}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8051}

    depends_on:
      - redis
    networks:
      - backend-network
volumes:
  sandbox_venvs:
    external: true
    
  sandbox_executions:
    external: true

  crew_pgdata:
    external: true
      
  crew_config:
    external: true
  
  media_data:
    external: true

networks:
  backend-network:
    driver: bridge

  frontend-network:
    driver: bridge

  mcp-network:
    driver: bridge
    external: true
