# Source of truth for src/.dev.env, src/debug.env, src/.env.example.
# Edit this file — never edit generated files directly.
# Regenerate:  python scripts/generate_env.py
# Check drift: python scripts/generate_env.py --check

header:
  example: |
    EpicStaff environment configuration.
    Copy to `.env`, fill in the marked secrets, then `docker compose up -d`.
    #
    # Lines marked CHANGE ME must be set before first run.
    # Everything else has sensible defaults that work for a local install.

# Groups map to "# ===== NAME =====" banners (closing "# =================="
# banner rendered after the last section of a group).
# Each section renders a blank line before its comment, then its vars.
# Var rendered in env iff its effective envs list (var-level → section-level →
# all) includes that env.
# Value resolution: env-specific key if present, else `default`.
# Per-env inline comment: mapping {value: ..., comment: "..."} on an env key.
# Above-var comment: var-level `comment:` key (or `<env>_comment:` override).

groups:

  # ------------------------------------------------------------------
  # Pre-SHARED block: IMAGE_TAG before the SHARED banner (example only)
  # ------------------------------------------------------------------
  - name: _PRE_SHARED
    no_banner: true
    sections:
      - comment: "Image tag to pull from ghcr.io/epicstaff/*\n# Use 'latest' to track main, or pin to a release like v1.0.7"
        envs: [example]
        vars:
          IMAGE_TAG:
            default: latest

  # ------------------------------------------------------------------
  # SHARED
  # ------------------------------------------------------------------
  - name: SHARED
    sections:
      - comment: Redis Configuration
        vars:
          REDIS_HOST:
            default: redis
            debug: 127.0.0.1
          REDIS_PORT:
            default: 6379
          REDIS_PASSWORD:
            default: redis_password
            example:
              value: ""
              comment: "CHANGE ME (any non-empty string)"

      - comment: redis-monitor
        envs: [dev, debug]
        vars:
          REDIS_CHECK_INTERVAL:
            default: 5
          REDIS_MAX_FAILURES:
            default: 1

      - comment: Database configuration
        vars:
          POSTGRES_DB:
            default: crew
          POSTGRES_PASSWORD:
            default: admin
            example:
              value: ""
              comment: "CHANGE ME (postgres superuser password)"
          PGDATA:
            default: /var/lib/postgresql/data
            debug: /var/lib/postgresql/data/pgdata
          DB_HOST_NAME:
            default: crewdb
            debug: 127.0.0.1
          DB_NAME:
            default: crew
          DB_PORT:
            default: 5432
          DB_USER:
            default: postgres

      - comment: Volumes
        vars:
          DOCKER_SOCK_PATH:
            default: /var/run/docker.sock
          DOCKER_BIN_PATH:
            default: /usr/bin/docker

      - comment: "Communication"
        envs: [example]
        vars:
          _COMMENTED_PAYLOAD_THRESHOLD:
            raw_line: "# DEFAULT_PAYLOAD_SIZE_THRESHOLD=        # To change default payload size threshold for all producers"

  # ------------------------------------------------------------------
  # SERVICES  (rendered with name "==== SERVICES ====")
  # ------------------------------------------------------------------
  - name: "==== SERVICES ===="
    sections:
      - comment: django_app
        vars:
          DEBUG:
            default: "True"
            example: "False"
          SECRET_KEY:
            default: "example-5$8!dbhafy9bp!gfu&jz6rt!f8+@!mpx$*bmajxg**u%=v2i+0"
            example:
              value: ""
              comment: "CHANGE ME (Django SECRET_KEY; generate a 50+ char random string)"
          JWT_SECRET:
            default: example-jwt-secret-change-me
            envs: [dev, example]
            example:
              value: ""
              comment: "CHANGE ME (≥32 char random string for JWT signing)"
          JWT_ACCESS_MINUTES:
            default: 10000
            envs: [dev, example]
            example: 60
          JWT_REFRESH_DAYS:
            default: 30
            envs: [dev, example]
            example: 7
          DJANGO_AUTO_CREATE_ADMIN:
            default: "False"
            envs: [dev, example]
            comment: "RBAC bootstrap — True to auto-create on startup, False to use\n# POST /api/auth/first-setup/ instead."
          DJANGO_ADMIN_EMAIL:
            default: admin@example.com
            envs: [dev, example]
          DJANGO_ADMIN_PASSWORD:
            default: epicstaff_password
            envs: [dev, example]
            example:
              value: ""
              comment: "CHANGE ME (only used when DJANGO_AUTO_CREATE_ADMIN=True)"
          DEFAULT_ORGANIZATION_NAME:
            default: Organization
            envs: [dev, example]
          PASSWORD_RESET_TOKEN_TTL:
            default: 900
            envs: [dev, example]
          PASSWORD_RESET_REQUEST_THROTTLE_RATE:
            default: 5/hour
            envs: [dev, example]
          EMAIL_HOST:
            default: mailpit
            envs: [dev, example]
            comment: "SMTP — leave EMAIL_HOST/USER/PASSWORD blank to fall back to the console email backend"
            example_comment: "SMTP — leave EMAIL_HOST/USER/PASSWORD blank to fall back to the console email backend."
          EMAIL_PORT:
            default: 1025
            envs: [dev, example]
          EMAIL_HOST_USER:
            default: ""
            envs: [dev, example]
          EMAIL_HOST_PASSWORD:
            default: ""
            envs: [dev, example]
          EMAIL_USE_TLS:
            default: "False"
            envs: [dev, example]
          EMAIL_USE_SSL:
            default: "False"
            envs: [dev, example]
          DEFAULT_FROM_EMAIL:
            default: no-reply@epicstaff.local
            envs: [dev, example]
          FRONTEND_BASE_URL:
            default: http://localhost:4200
            envs: [dev, example]
          FRONTEND_PASSWORD_RESET_PATH:
            default: /reset-password
            envs: [dev, example]
          PASSWORD_CHANGE_TICKET_TTL_SECONDS:
            default: 300
            envs: [dev, example]
          AVATAR_MAX_BYTES:
            default: 5242880
            envs: [dev, example]
          AVATAR_ALLOWED_FORMATS:
            default: JPEG,PNG
            envs: [dev, example]
          DJANGO_API_KEY:
            default: epicstaff_realtime_api_key
            envs: [dev, example]
            comment: "Internal-service API key (no owner)."
            example_comment: "Internal-service API key (no owner). Must match across services."
            example:
              value: ""
              comment: "CHANGE ME (any random string)"
          ALLOWED_HOSTS:
            default: "0.0.0.0,127.0.0.1,localhost,django_app"
          GUNICORN_WORKERS:
            default: 1
          GUNICORN_THREADS:
            default: 4
          MEDIA_ROOT:
            default: /app/media
            envs: [dev, example]
          DB_NAME_DJANGO:
            # duplicate DB_NAME entry that appears in the django_app section of .dev.env
            key: DB_NAME
            default: crew
            envs: [dev]
          DJANGO_HOST:
            default: localhost
            envs: [dev, example, debug]
          DJANGO_PORT:
            default: 8000
          LOAD_DEBUG_ENV:
            default: "False"
            debug: "True"
            dev: "True"
          MALLOC_ARENA_MAX:
            default: 2
            envs: [dev, example]
            comment: Memory tuning
          MALLOC_TRIM_INTERVAL_SECONDS:
            default: 60
            envs: [dev, example]

      - comment: Gunicorn
        envs: [dev, example]
        vars:
          GUNICORN_MAX_REQUESTS:
            default: 1000
          GUNICORN_MAX_REQUESTS_JITTER:
            default: 100

      - comment: realtime
        vars:
          DB_REALTIME_USER:
            default: realtime_user_v104
            example: realtime_user
          DB_REALTIME_PASSWORD:
            default: realtime_password_v104
            example:
              value: ""
              comment: "CHANGE ME (postgres role password for realtime service)"
          REALTIME_PORT:
            default: 8050
          DJANGO_AUTH_URL:
            default: http://django_app:8000
            debug: http://127.0.0.1:8000
          DJANGO_API_KEY:
            # In debug.env DJANGO_API_KEY appears under realtime (not django_app)
            default: epicstaff_realtime_api_key
            envs: [debug]
          DJANGO_AUTH_TIMEOUT:
            default: 5

      - comment: manager
        vars:
          PULL_TOOL:
            default: "FALSE"
            example: "False"
          DB_MANAGER_USER:
            default: manager_user_v104
            example: manager_user
          DB_MANAGER_PASSWORD:
            default: manager_password_v104
            example:
              value: ""
              comment: "CHANGE ME (postgres role password for manager service)"
          CREW_SAVEFILES_PATH:
            default: /c/savefiles
            envs: [dev, debug]
          CREW_SAVEFILES_PATH_EX:
            key: CREW_SAVEFILES_PATH
            default: /c/savefiles
            envs: [example]
            comment: "CREW_SAVEFILES_PATH must be an absolute host path. Linux/macOS: e.g. /home/<you>/savefiles.\n# Windows + Docker Desktop: /c/savefiles. Override per-OS in the install command."
          MANAGER_HOST:
            default: manager_container
            envs: [dev, example, debug]
          MANAGER_PORT:
            default: 8001
            envs: [dev, example, debug]
          TIMEZONE:
            default: Europe/Kyiv
            envs: [dev, debug]
            comment: "Timezone for ScheduleTriggerNode (APScheduler). IANA format, e.g. UTC, Europe/Kyiv, America/New_York"
          _SAVEFILES_NOTE:
            raw_line: "# CREW_SAVEFILES_PATH -> For linux use a valid path (ex. /home/folder/project/savefiles)"
            envs: [dev, debug]

      - comment: crew
        vars:
          HAYSTACK_TELEMETRY_ENABLED:
            default: "False"
          ANONYMIZED_TELEMETRY:
            default: "False"
          EC_TELEMETRY:
            default: "False"
          MONITORING_MODE:
            default: local
          DB_CREW_USER:
            default: crew_user_v104
            example: crew_user
          DB_CREW_PASSWORD:
            default: crew_password_v104
            example:
              value: ""
              comment: "CHANGE ME (postgres role password for crew service)"
          MAX_CONCURRENT_SESSIONS:
            default: 25
          DEFAULT_RAG_SEARCH_TIMEOUT:
            default: 40
            envs: [dev, example]
            comment: "RAG search timeouts (seconds)"
          NAIVE_RAG_SEARCH_TIMEOUT:
            default: 40
            envs: [dev, example]
          GRAPH_RAG_SEARCH_TIMEOUT:
            default: 180
            envs: [dev, example]

      - comment: sandbox
        vars:
          BASE_VENV_PATH:
            default: /app/src/sandbox/venvs/
          OUTPUT_PATH:
            default: /app/src/sandbox/executions/
          CONTAINER_SAVEFILES_PATH:
            default: /app/src/sandbox/savefiles/
            comment: sandbox volumes
            envs: [dev, debug]
          CONTAINER_SAVEFILES_PATH_EX:
            key: CONTAINER_SAVEFILES_PATH
            default: /app/src/sandbox/savefiles/
            envs: [example]

      - comment: knowledge
        vars:
          DB_KNOWLEDGE_USER:
            default: knowledge_user_v104
            example: knowledge_user
          DB_KNOWLEDGE_PASSWORD:
            default: knowledge_password_v104
            example:
              value: ""
              comment: "CHANGE ME (postgres role password for knowledge service)"

      - comment: webhook
        vars:
          WEBHOOK_HOST_NAME:
            default: '"webhook"'
            debug: '"localhost"'
            example: webhook
          USE_TUNNEL:
            default: '"True"'
            dev: "False"
            example: "False"
          WEBHOOK_TUNNEL:
            default: '"NGROK"'
            dev: ""
            debug: '"ngrok"'
            example: NGROK
          WEBHOOK_AUTH:
            default: '""'
            example: ""
            comment: "TODO: REMOVE IT GODDAMMIT"
            debug_comment: "TODO: REMOVE IT GODDAMMIT"
          WEBHOOK_PORT:
            default: 8009
          NGROK_AUTHTOKEN:
            default: ""
            envs: [example]
            comment: "Ngrok (only used when USE_TUNNEL=True and WEBHOOK_TUNNEL=NGROK)"
          NGROK_DOMAIN:
            default: ""
            envs: [example]

      - comment: code
        envs: [dev, example]
        vars:
          CODE_MANAGER_PORT:
            default: 4080
          CODE_BASE_PORT:
            default: 4096
          CODE_MAX_INSTANCES:
            default: 5
          CODE_IDLE_TIMEOUT:
            default: 300
          CODE_REAP_INTERVAL:
            default: 30
          CODE_INSTANCES_DIR:
            default: /opt/opencode/instances

      - comment: frontend
        vars:
          FRONTEND_PORT:
            default: 4200
          API_URL:
            default: http://127.0.0.1:8000/api/
          REALTIME_API_URL:
            default: http://127.0.0.1:8050/realtime/
            debug: http://127.0.0.1:8000/realtime/

      - comment: nginx
        vars:
          DOMAIN_NAME:
            default: '"localhost"'
            example: localhost
          SSL_ENABLE:
            default: "#"
            comment: 'SSL_ENABLE=#  <-- for disabling ssl in nginx\n# SSL_ENABLE=  <-- for enabling ssl in nginx'
            example_comment: 'SSL_ENABLE=#  <-- # disables ssl\n# SSL_ENABLE=   <-- empty enables ssl'

      - comment: storage
        envs: [dev, example]
        vars:
          STORAGE_BACKEND:
            default: s3
          STORAGE_LOCAL_ROOT:
            default: /app/storage
          STORAGE_ENDPOINT:
            default: http://minio:9000
          STORAGE_ACCESS_KEY:
            default: minioadmin
          STORAGE_SECRET_KEY:
            default: minioadmin_secret
            example:
              value: ""
              comment: "CHANGE ME (minio secret, ≥8 chars)"
          STORAGE_BUCKET_NAME:
            default: epicstaff
          MINIO_PORT:
            default: 9000
          MINIO_CONSOLE_PORT:
            default: 9001

      - comment: agent
        envs: [dev]
        vars:
          AGENT_PORT:
            default: 8052
          AGENT_DEFAULT_MAX_RETRIES:
            default: 5
          AGENT_DEFAULT_MAX_ITER:
            default: 25
          LOG_LEVEL:
            default: DEBUG
