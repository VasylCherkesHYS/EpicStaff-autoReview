sections:
  - name: Security
    vars:
      - key: SECRET_KEY
        description: "Django secret key"
        hint: "Generate: python -c \"from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())\""
        default: ""
      - key: POSTGRES_PASSWORD
        description: "PostgreSQL password"
        default: "admin"
      - key: REDIS_PASSWORD
        description: "Redis password"
        default: "redis_password"
      - key: DB_REALTIME_PASSWORD
        description: "Realtime service DB user password"
        default: "realtime_password"
      - key: DB_MANAGER_PASSWORD
        description: "Manager service DB user password"
        default: "manager_password"
      - key: DB_CREW_PASSWORD
        description: "Crew service DB user password"
        default: "crew_password"
      - key: DB_KNOWLEDGE_PASSWORD
        description: "Knowledge service DB user password"
        default: "knowledge_password"

  - name: Domain & SSL
    vars:
      - key: DOMAIN_NAME
        description: "Production domain name"
        default: "localhost"
      - key: ALLOWED_HOSTS
        description: "Django ALLOWED_HOSTS comma-separated"
        default: "0.0.0.0,127.0.0.1,localhost"
      - key: API_URL
        description: "Frontend API URL"
        default: "https://example.com/api/"
      - key: REALTIME_API_URL
        description: "Frontend Realtime API URL"
        default: "https://example.com/realtime/"
      - key: SSL_ENABLE
        description: "SSL flag: empty string = enabled, # = disabled"
        default: ""

  - name: Infrastructure
    vars:
      - key: CREW_SAVEFILES_PATH
        description: "Host path for crew savefiles"
        default: "/home/user/savefiles"

  - name: Voice / Twilio
    vars:
      - key: TWILIO_ACCOUNT_SID
        description: "Twilio Account SID"
        required: false
        default: ""
      - key: TWILIO_AUTH_TOKEN
        description: "Twilio Auth Token"
        required: false
        default: ""
      - key: VOICE_AGENT_ID
        description: "RealtimeAgent ID for voice calls"
        required: false
        default: "2"
      - key: VOICE_STREAM_URL
        description: "Twilio MediaStream WebSocket URL"
        hint: "e.g. wss://example.com/voice/stream"
        required: false
        default: ""
      - key: NGROK_AUTHTOKEN
        description: "ngrok auth token"
        hint: "Get from https://dashboard.ngrok.com/authtokens"
        required: false
        default: ""
      - key: NGROK_DOMAIN
        description: "ngrok static domain"
        hint: "e.g. example.ngrok-free.app"
        required: false
        default: ""
