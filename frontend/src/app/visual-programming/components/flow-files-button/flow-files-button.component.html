<button
    class="flow-files-btn"
    [class.flow-files-btn--active]="attachedCount() > 0"
    (click)="openDialog()"
    matTooltip="Add files to flow"
>
    <app-svg-icon
        icon="file-upload"
        size="12px"
        class="flow-files-btn__icon"
    ></app-svg-icon>
    @if (attachedCount() > 0) {
        <span class="flow-files-btn__count">{{ attachedCount() }}</span>
    } @else {
        <span class="flow-files-btn__label">Add Files</span>
    }
</button>
