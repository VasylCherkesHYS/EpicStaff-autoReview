<button
    type="button"
    class="flow-shortcuts-btn"
    matTooltip="Keyboard shortcuts"
    matTooltipPosition="right"
    (click)="clicked.emit()"
>
    <span class="flow-shortcuts-btn__icon">
        <app-svg-icon
            [icon]="icon()"
            [size]="iconSize()"
        ></app-svg-icon>
    </span>

    <span class="flow-shortcuts-btn__text">{{ label() }}</span>
</button>
