<div class="container">
    <div class="dialog-header">
        <div class="header-left">
            <app-svg-icon
                icon="settings"
                size="1.5rem"
                class="header-icon"
            />
            <h2 class="title">Flow Settings</h2>
        </div>
        <button
            class="close-btn"
            type="button"
            (click)="dialogRef.close()"
            matTooltip="Close"
            matTooltipPosition="above"
        >
            <app-icon
                icon="ui/close"
                size="14px"
            />
        </button>
    </div>

    <div class="dialog-content">
        <div class="form-section form-section--toggle">
            <span class="section-label">Arrow colors</span>
            <app-toggle-switch
                [checked]="flowSettings.arrowColorsEnabled()"
                (checkedChange)="flowSettings.arrowColorsEnabled.set($event)"
            />
        </div>

        <div class="form-section form-section--toggle">
            <span class="section-label">Show Inputs/Outputs</span>
            <app-toggle-switch
                [checked]="flowSettings.showInputsOutputs()"
                (checkedChange)="flowSettings.showInputsOutputs.set($event)"
            />
        </div>

        <div class="form-section">
            <span class="section-label">Timezone</span>
            <app-timezone-selector [formControl]="timezoneControl" />
        </div>
    </div>
</div>
