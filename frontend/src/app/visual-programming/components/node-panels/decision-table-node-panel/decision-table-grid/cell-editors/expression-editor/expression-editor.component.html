<div class="expression-editor-container">
    <app-editor-toolbar
        [mode]="editorMode()"
        (tokenInserted)="insertToken($event)"
    />
    <div class="editor-wrapper">
        <div
            class="editor-backdrop"
            #backdrop
        ></div>
        <textarea
            #input
            [(ngModel)]="value"
            class="expression-input"
            [rows]="10"
            [cols]="50"
            (keydown)="onKeyDown($event)"
            (input)="onInput($event)"
            (scroll)="onScroll()"
            (click)="onInput($event)"
            (blur)="onBlur($event)"
        ></textarea>
        <div
            class="python-badge"
            title="Python expression syntax"
        >
            <app-svg-icon icon="python"></app-svg-icon>
        </div>
    </div>
</div>
