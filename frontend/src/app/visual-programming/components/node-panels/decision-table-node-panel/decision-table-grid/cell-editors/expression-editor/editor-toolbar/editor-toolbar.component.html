<div class="editor-toolbar">
    <button
        class="toolbar-btn"
        (click)="insertToken('@')"
        matTooltip="Insert Variable"
        matTooltipPosition="above"
    >
        <span
            class="keyword"
            style="color: #a5a5ff"
            >&#64;</span
        >
    </button>
    <div class="separator"></div>

    @if (mode() === 'condition') {
        <button
            class="toolbar-btn"
            (click)="insertToken('and')"
            matTooltip="Insert AND operator"
            matTooltipPosition="above"
        >
            <span class="keyword">AND</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('or')"
            matTooltip="Insert OR operator"
            matTooltipPosition="above"
        >
            <span class="keyword">OR</span>
        </button>
        <div class="separator"></div>
        <button
            class="toolbar-btn"
            (click)="insertToken('>')"
            matTooltip="Greater than"
            matTooltipPosition="above"
        >
            <span>&gt;</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('<')"
            matTooltip="Less than"
            matTooltipPosition="above"
        >
            <span>&lt;</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('==')"
            matTooltip="Equals"
            matTooltipPosition="above"
        >
            <span>==</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('!=')"
            matTooltip="Not equals"
            matTooltipPosition="above"
        >
            <span>!=</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('>=')"
            matTooltip="Greater or equal"
            matTooltipPosition="above"
        >
            <span>&gt;=</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('<=')"
            matTooltip="Less or equal"
            matTooltipPosition="above"
        >
            <span>&lt;=</span>
        </button>
    }

    @if (mode() === 'manipulation') {
        <button
            class="toolbar-btn"
            (click)="insertToken('(')"
            matTooltip="Open parenthesis"
            matTooltipPosition="above"
        >
            <span style="color: #ffd43b">(</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken(')')"
            matTooltip="Close parenthesis"
            matTooltipPosition="above"
        >
            <span style="color: #ffd43b">)</span>
        </button>
        <div class="separator"></div>
        <button
            class="toolbar-btn"
            (click)="insertToken('=')"
            matTooltip="Assign"
            matTooltipPosition="above"
        >
            <span>=</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('+')"
            matTooltip="Add"
            matTooltipPosition="above"
        >
            <span>+</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('-')"
            matTooltip="Subtract"
            matTooltipPosition="above"
        >
            <span>-</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('*')"
            matTooltip="Multiply"
            matTooltipPosition="above"
        >
            <span>*</span>
        </button>
        <button
            class="toolbar-btn"
            (click)="insertToken('/')"
            matTooltip="Divide"
            matTooltipPosition="above"
        >
            <span>/</span>
        </button>
    }
</div>
