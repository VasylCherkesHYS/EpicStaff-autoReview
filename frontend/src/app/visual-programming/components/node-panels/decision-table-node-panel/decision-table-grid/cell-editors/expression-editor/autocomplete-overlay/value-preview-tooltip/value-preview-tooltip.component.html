<div
    class="value-preview"
    [class.left]="position() === 'left'"
    [class.right]="position() === 'right'"
>
    <div class="title">Preview</div>
    <div class="body" *ngIf="!isObject(); else objectValue">
        <span class="primitive">{{ value() }}</span>
    </div>
    <ng-template #objectValue>
        <pre class="json">{{ value() | json }}</pre>
    </ng-template>
</div>
