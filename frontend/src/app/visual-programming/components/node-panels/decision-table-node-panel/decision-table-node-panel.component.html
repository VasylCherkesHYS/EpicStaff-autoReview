<div class="panel-container">
    <div class="panel-content">
        @if (form) {
            <form
                [formGroup]="form"
                class="form-container"
            >
                <div class="form-header">
                    <app-custom-input
                        label="Node Name"
                        tooltipText="The unique identifier used to reference this decision table node."
                        icon="help-circle"
                        formControlName="node_name"
                        placeholder="Enter node name"
                        [activeColor]="activeColor"
                        [errorMessage]="getNodeNameErrorMessage()"
                    ></app-custom-input>

                    <app-select
                        label="Default Next Node"
                        tooltipText="Optional fallback branch when no condition matches"
                        placeholder="-- Select Node --"
                        formControlName="default_next_node"
                        [items]="availableNodeItems()"
                    />

                    <app-select
                        label="Error Next Node"
                        tooltipText="Optional error branch if decision evaluation fails"
                        placeholder="-- Select Node --"
                        formControlName="next_error_node"
                        [items]="availableNodeItems()"
                    />
                    <div class="convert-toggle-field">
                        <label class="convert-toggle-label">
                            Classification Dec Table
                            <app-help-tooltip text="Convert this node to a Classification Decision Table" />
                        </label>
                        <button
                            type="button"
                            class="cdt-toggle"
                            aria-label="Convert to Classification Decision Table"
                            (click)="convertToCdt()"
                        >
                            <span class="toggle-thumb"></span>
                        </button>
                    </div>
                </div>

                <div class="grid-section">
                    <app-decision-table-grid
                        [conditionGroups]="conditionGroups()"
                        [activeColor]="activeColor"
                        [currentNodeId]="node().id"
                        title="Condition groups define branching paths evaluated in order"
                        (conditionGroupsChange)="onConditionGroupsChange($event)"
                    />
                </div>
            </form>
        }
    </div>
</div>
