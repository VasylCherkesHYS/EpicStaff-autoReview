<div class="flow-zoom-controls">
    @for (control of zoomControls; track control.icon) {
        <button
            class="zoom-button"
            [matTooltip]="control.tooltip"
            (click)="control.action()"
        >
            <app-svg-icon [icon]="control.icon"></app-svg-icon>
        </button>
    }
</div>
