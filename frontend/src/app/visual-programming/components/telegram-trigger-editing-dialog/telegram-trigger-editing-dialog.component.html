<div class="dialog">
    <div class="dialog__header">
        <span class="dialog__header-title"> Editing Fields </span>

        <div class="dialog__actions">
            <app-svg-icon icon="close" size="1.5rem" class="dialog__action" (click)="onCancel()" />
            <app-svg-icon icon="check" size="1.5rem" class="dialog__action dialog__action--save" (click)="onSave()" />
        </div>
    </div>

    <div class="main">
        <div class="main__fields-section">
            <div class="main__fields-searchbar">
                <app-search class="main__input" placeholder="Search fields..." [(searchTerm)]="searchTerm" />
                <label>Activate checkbox near variable to save its value</label>
            </div>
            <app-telegram-fields-table [searchTerm]="searchTerm()" [(tableItems)]="tableItems" />
        </div>

        <div class="main__mock-data-section">
            <label class="main__mock-data-header">
                Mock Data
                <span class="main__active-fields-count">
                    Activated fields: {{ checkedItems().length }} of {{ tableItems().length }}
                </span>
            </label>
            <div class="main__mock-data-info">
                <app-svg-icon icon="help" size="18px" class="main__mock-data-info-icon" />
                <a
                    class="main__mock-data-link"
                    href="https://core.telegram.org/bots/api#available-types"
                    target="_blank"
                    >Click here</a
                >
                to get more information about field models
            </div>
            <div class="main__json-wrapper">
                <app-json-editor
                    [jsonData]="jsonValues()"
                    [showHeader]="false"
                    [fullHeight]="true"
                    [editorOptions]="editorOptions"
                />
            </div>
        </div>
    </div>
</div>
