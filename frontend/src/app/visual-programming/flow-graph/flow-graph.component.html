<div class="editor-wrapper">
    <f-flow
        appMouseTracker
        (mousePosition)="updateMouseTrackerPosition($event)"
        (contextmenu)="onContextMenu($event)"
        (click)="onCloseContextMenu()"
        fDraggable
        [vCellSize]="GRID_CELL_SIZE"
        [hCellSize]="GRID_CELL_SIZE"
        [fCellSizeWhileDragging]="false"
        class="visual-programming-flow"
        appShortcutListener
        (delete)="onDelete()"
        (undo)="onUndo()"
        (redo)="onRedo()"
        (copy)="onCopy()"
        (paste)="onPaste()"
        (fLoaded)="onInitialized()"
        (fDragStarted)="onDragStarted($event)"
        (fDragEnded)="onDragEnded()"
        (fCreateConnection)="onConnectionAdded($event)"
        (fReassignConnection)="onReassignConnection($event)"
        (fCreateNode)="onNodeDroppedFromPanel($event)"
    >
        <f-background>
            <f-circle-pattern></f-circle-pattern>
        </f-background>
        <f-magnetic-lines></f-magnetic-lines>
        <f-canvas fZoom>
            <f-snap-connection
                fBehavior="fixed"
                fType="segment"
                [fSnapThreshold]="100"
            >
                <svg
                    viewBox="0 0 10 10"
                    fMarker
                    [type]="eMarkerType.START"
                    [height]="10"
                    [width]="10"
                    [refX]="5"
                    [refY]="5"
                >
                    <circle
                        cx="5"
                        cy="5"
                        r="2"
                        stroke="none"
                    ></circle>
                </svg>
                <svg
                    viewBox="0 0 6 6"
                    fMarker
                    [type]="eMarkerType.END"
                    [height]="6"
                    [width]="6"
                    [refX]="5"
                    [refY]="3"
                >
                    <path
                        d="M0,0 L6,3 0,6Z"
                        stroke="none"
                    ></path>
                </svg>
            </f-snap-connection>
            <f-connection-for-create
                fBehavior="floating"
                fType="straight"
            >
                <svg
                    viewBox="0 0 10 10"
                    fMarker
                    [type]="eMarkerType.START"
                    [height]="10"
                    [width]="10"
                    [refX]="5"
                    [refY]="5"
                >
                    <circle
                        cx="5"
                        cy="5"
                        r="2"
                        stroke="none"
                    ></circle>
                </svg>
                <svg
                    viewBox="0 0 6 6"
                    fMarker
                    [type]="eMarkerType.END"
                    [height]="6"
                    [width]="6"
                    [refX]="5"
                    [refY]="3"
                >
                    <path
                        d="M0,0 L6,3 0,6Z"
                        stroke="none"
                    ></path>
                </svg>
            </f-connection-for-create>

            @for (node of flowService.nodes(); track node.id) {
                <app-flow-base-node
                    [node]="node"
                    [showVariables]="showVariables()"
                    [fMinimapClass]="getMinimapClassForNode(node)"
                    fNode
                    fDragHandle
                    [fNodeId]="node.id"
                    [fNodeSize]="node.size"
                    [fNodePosition]="node.position"
                    [style.z-index]="2"
                    (fNodePositionChange)="onNodePositionChanged($event, node)"
                    (fNodeSizeChange)="onNodeSizeChanged($event, node)"
                    (editClicked)="onOpenNodePanel($event)"
                    (projectExpandToggled)="onProjectExpandToggled($event)"
                >
                </app-flow-base-node>
            }

            @for (
                connection of sortedConnections();
                track connection.id +
                    '-' +
                    (connectionRenderVersions()[connection.id] ?? 0) +
                    '-' +
                    (backwardConnectionIds().has(connection.id) ? 'b' : 'f')
            ) {
                <f-connection
                    [fBehavior]="connection.behavior || 'fixed'"
                    [fType]="backwardConnectionIds().has(connection.id) ? 'backward-arc' : connection.type || 'segment'"
                    [fOffset]="connection.userAdjustedWaypoints ? 0 : 30"
                    [fOutputId]="connection.sourcePortId"
                    [fInputId]="connection.targetPortId"
                    [fConnectionId]="connection.id"
                    [class.dashed-connection]="connection.category === 'virtual'"
                    [class.is-backward]="backwardConnectionIds().has(connection.id)"
                    [style.z-index]="backwardConnectionIds().has(connection.id) ? 0 : 1"
                    [style.--marker-start-color]="
                        smartRoutingEnabled()
                            ? nodeColorMap().get(connection.sourceNodeId) || '#555'
                            : connection.startColor || '#555'
                    "
                    [style.--marker-end-color]="
                        smartRoutingEnabled()
                            ? nodeColorMap().get(connection.targetNodeId) || '#555'
                            : connection.endColor || '#555'
                    "
                >
                    <f-connection-gradient
                        [fStartColor]="
                            smartRoutingEnabled() ? nodeColorMap().get(connection.sourceNodeId) || '#555' : '#555'
                        "
                        [fEndColor]="
                            smartRoutingEnabled() ? nodeColorMap().get(connection.targetNodeId) || '#555' : '#555'
                        "
                    ></f-connection-gradient>

                    <svg
                        viewBox="0 0 10 10"
                        fMarker
                        [type]="eMarkerType.START"
                        [height]="10"
                        [width]="10"
                        [refX]="5"
                        [refY]="5"
                    >
                        <circle
                            cx="5"
                            cy="5"
                            r="2"
                            stroke="none"
                            [attr.fill]="
                                smartRoutingEnabled()
                                    ? nodeColorMap().get(connection.sourceNodeId) || '#555'
                                    : connection.startColor || '#555'
                            "
                        ></circle>
                    </svg>

                    <svg
                        viewBox="0 0 6 6"
                        fMarker
                        [type]="eMarkerType.END"
                        [height]="6"
                        [width]="6"
                        [refX]="5"
                        [refY]="3"
                    >
                        <path
                            d="M0,0 L6,3 0,6Z"
                            stroke="none"
                            [attr.fill]="
                                smartRoutingEnabled()
                                    ? nodeColorMap().get(connection.targetNodeId) || '#555'
                                    : connection.endColor || '#555'
                            "
                        ></path>
                    </svg>

                    <svg
                        viewBox="0 0 10 10"
                        fMarker
                        [type]="eMarkerType.SELECTED_START"
                        [height]="10"
                        [width]="10"
                        [refX]="5"
                        [refY]="5"
                    >
                        <circle
                            cx="5"
                            cy="5"
                            r="2"
                            stroke="none"
                        ></circle>
                    </svg>

                    <svg
                        viewBox="0 0 6 6"
                        fMarker
                        [type]="eMarkerType.SELECTED_END"
                        [height]="6"
                        [width]="6"
                        [refX]="5"
                        [refY]="3"
                    >
                        <path
                            d="M0,0 L6,3 0,6Z"
                            stroke="none"
                        ></path>
                    </svg>
                    <div
                        fConnectionContent
                        class="connection-center"
                        [position]="CONNECTION_DELETE_BUTTON_POSITION"
                    >
                        <button
                            type="button"
                            class="icon-button delete-icon"
                            title="Delete connection"
                            aria-label="Delete connection"
                            (click)="onDeleteConnection($event, connection.id)"
                        >
                            <i class="ti ti-trash"></i>
                        </button>
                    </div>

                    <f-connection-waypoints
                        appWaypointTooltip
                        [waypoints]="connection.waypoints ?? []"
                        (waypointsChange)="onWaypointsChanged(connection.id, $event)"
                        [radius]="5"
                        [visibility]="true"
                    ></f-connection-waypoints>
                </f-connection>
            }
        </f-canvas>

        <f-selection-area></f-selection-area>
        <f-minimap [fMinSize]="1000"></f-minimap>
    </f-flow>

    <div class="top-left-actions">
        <div class="top-left-actions__column">
            <button
                class="domain-button"
                (click)="onDomainClick()"
            >
                Domain
            </button>

            <div
                #shortcutsAnchor
                #shortcutsButton
                appShortcutListener
                (openShortcuts)="onOpenShortcuts(shortcutsAnchor)"
            >
                <app-flow-shortcuts-button (clicked)="onOpenShortcuts(shortcutsAnchor)"> </app-flow-shortcuts-button>
            </div>
        </div>

        <app-nodes-search
            [nodes]="flowService.nodes()"
            (nodeSelected)="onZoomInNode($event)"
            (nodeDoubleClicked)="onNodeDoubleClickAndZoom($event)"
        ></app-nodes-search>
    </div>

    <div class="top-right-controls">
        <div class="top-right-actions">
            @if (currentFlowId) {
                <app-flow-files-button
                    [flowId]="currentFlowId"
                    [flowName]="flowName"
                ></app-flow-files-button>
            }
            <button
                class="show-inputs-btn"
                [class.active]="showVariables()"
                (click)="toggleShowVariables()"
            >
                {{ showVariables() ? 'Hide Inputs/Output' : 'Show Inputs/Output' }}
            </button>

            <div class="routing-toggle-block">
                <app-svg-icon
                    icon="routing-arrow"
                    size="22px"
                ></app-svg-icon>
                <app-toggle-switch
                    [checked]="smartRoutingEnabled()"
                    (checkedChange)="onSmartRoutingToggle($event)"
                ></app-toggle-switch>
            </div>
        </div>
    </div>
    <app-flow-action-panel></app-flow-action-panel>

    @if (showContextMenu()) {
        <app-flow-graph-context-menu
            [position]="contextMenuPosition()"
            [currentFlowId]="currentFlowId"
            (nodeSelected)="onAddNodeFromContextMenu($event)"
        >
        </app-flow-graph-context-menu>
    }

    <app-node-panel-shell
        [node]="sidePanelService.selectedNode()"
        [currentFlowId]="currentFlowId"
        (save)="onNodePanelSaved($event)"
        (autosave)="onNodePanelAutosaved($event)"
        #nodePanelShell
    />
</div>
