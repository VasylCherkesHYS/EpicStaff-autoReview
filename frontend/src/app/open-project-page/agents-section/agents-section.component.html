<!-- agents-section.component.html -->
<div
    class="agents-section"
    appClickOutside
    (appClickOutside)="onOutsideClick()"
>
    <!-- Grid controls - search and size switcher -->
    <div class="grid-container">
        <!-- Loading Animation -->
        @if (!isLoaded) {
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <p class="loading-text">Loading agents...</p>
            </div>
        }

        <!-- Staff Agent Cards -->
        @for (agent of agents; track trackAgentById($index, agent)) {
            <app-staff-agent-card
                [agent]="agent"
                [size]="currentGridSize"
                [cardState]="cardState"
                (removeAgent)="onRemoveStaffAgent($event)"
            >
            </app-staff-agent-card>
        }
    </div>

    <app-grid-controls
        #gridControls
        (currentSizeChange)="onGridSizeChanged($event)"
        (staffAgentAdded)="onAddStaffAgent($event)"
    ></app-grid-controls>
</div>
