            <ng-container>
                <div
                    *ngIf="cardState === 'adding'"
                    class="icon-container add-icon-container"
                    title="Add Agent"
                    (click)="onAddAgentClick()"
                >
                    <app-svg-icon icon="plus" size="20px" class="plus-icon" />
                </div>

                <div
                    *ngIf="cardState !== 'adding'"
                    class="icon-container remove-icon-container"
                    title="Remove Agent"
                    (click)="onRemoveAgentClick()"
                >
                    <app-svg-icon icon="x" size="20px" class="close-icon" />
                </div>
            </ng-container>
        </div>
    </div>
    <div class="body">
        <!-- GOAL SECTION -->
        <div class="section">
            <h4 class="section-title">GOAL</h4>
            <div class="collapsible-content">
                <p class="section-content" [class.truncated]="!goalExpanded">
                    {{ agent.goal }}
                </p>
                <button
                    *ngIf="isTextTruncated(agent.goal)"
                    class="toggle-button"
                    (click)="goalExpanded = !goalExpanded"
                >
                    {{ goalExpanded ? 'Show Less' : 'Show More' }}
                </button>
            </div>
        </div>

        <!-- BACKSTORY SECTION -->
        <div class="section">
            <h4 class="section-title">BACKSTORY</h4>
            <div class="collapsible-content">
                <p class="section-content" [class.truncated]="!backstoryExpanded">
                    {{ agent.backstory }}
                </p>
                <button
                    *ngIf="isTextTruncated(agent.backstory)"
                    class="toggle-button"
                    (click)="backstoryExpanded = !backstoryExpanded"
                >
                    {{ backstoryExpanded ? 'Show Less' : 'Show More' }}
                </button>
            </div>
        </div>

        <!-- DETAILS SECTION (Model, Tools, Tags) -->
        <div class="section">
            <div class="section-header" (click)="toggleSection('details')">
                <h4 class="section-title">DETAILS</h4>
                <app-svg-icon
                    icon="chevron-down"
                    size="16px"
                    class="icon"
                    [class.expanded]="sectionStates.details"
                />
            </div>

            <div
                class="details-content"
                [class.expanded]="sectionStates.details"
                [@expandCollapse]="sectionStates.details ? 'expanded' : 'collapsed'"
            >
                <!-- MODEL SECTION -->
                <div class="details-subsection">
                    <h5 class="subsection-title">MODEL</h5>
                    <div *ngIf="agent.fullLlmConfig; else noModel" class="model-info-container">
                        <app-svg-icon
                            [icon]="getProviderIcon(agent.fullLlmConfig.providerDetails?.name)"
                            size="1.7rem"
                            class="provider-icon"
                        />
                        <div class="model-info">
                            <p class="model-name">
                                {{ agent.fullLlmConfig.modelDetails?.name }}
                            </p>
                            <p class="model-custom-name" *ngIf="agent.fullLlmConfig.custom_name">
                                {{ agent.fullLlmConfig.custom_name }}
                            </p>
                        </div>
                    </div>
                    <ng-template #noModel>
                        <p class="section-subtitle"><em>No LLM provided</em></p>
                    </ng-template>
                </div>

                <!-- TOOLS SECTION -->
                <div class="details-subsection">
                    <h5 class="subsection-title">
                        TOOLS
                        <span class="tool-count" *ngIf="getTotalToolsCount() > 0">({{ getTotalToolsCount() }})</span>
                    </h5>
                    <div *ngIf="agent.mergedTools && agent.mergedTools.length > 0; else noTools">
                        <div class="tools-container">
                            <div class="tool-item" *ngFor="let tool of getDisplayedTools()">
                                <app-svg-icon
                                    *ngIf="tool.type === 'python-tool'"
                                    icon="python"
                                    size="16px"
                                    class="python-icon"
                                />
                                <app-svg-icon
                                    *ngIf="tool.type !== 'python-tool'"
                                    icon="tools"
                                    size="16px"
                                    [class.tool-config]="tool.type === 'tool-config'"
                                />
                                <span class="tool-name">{{ getToolDisplayName(tool) }}</span>
                            </div>

                            <button
                                *ngIf="shouldShowToolsToggle()"
                                class="toggle-button tools-toggle"
                                (click)="toggleToolsExpanded()"
                            >
                                {{
                                    toolsExpanded
                                        ? 'Show Less'
                                        : 'Show More (' + (getTotalToolsCount() - getVisibleToolsCount()) + ')'
                                }}
                            </button>
                        </div>
                    </div>
                    <ng-template #noTools>
                        <p class="section-subtitle">
                            <em>No tools assigned</em>
                        </p>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>
</div>
