<div class="panel-content">
    <!-- Description Section -->
    <div
        class="description"
        [class.editing]="isEditingDescription"
    >
        <textarea
            [(ngModel)]="internalDescription"
            [placeholder]="'Enter ' + entityNoun + ' description...'"
            #descriptionTextarea
            [rows]="getTextareaRows(internalDescription)"
            (focus)="onFocusDescription()"
            (blur)="onBlurDescription()"
            (input)="adjustTextareaHeight(descriptionTextarea); onDescriptionInput()"
        ></textarea>
    </div>
</div>
