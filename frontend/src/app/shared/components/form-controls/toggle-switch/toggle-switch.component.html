@if (label()) {
    <app-tooltip
        [required]="required()"
        [tooltipText]="tooltipText()"
        [label]="label()"
        [icon]="icon()"
    />
}

<label class="switch">
    <input
        type="checkbox"
        [checked]="checked"
        (click)="$event.preventDefault(); onToggle()"
    />
    <span class="slider"></span>
</label>
