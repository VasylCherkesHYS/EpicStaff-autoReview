@if (label()) {
    <app-tooltip
        [required]="required()"
        [tooltipText]="tooltipText()"
        [label]="label()"
        [icon]="icon()"
    />
}

<label
    class="switch"
    [class.switch--disabled]="isDisabled"
>
    <input
        type="checkbox"
        [checked]="checked"
        [disabled]="isDisabled"
        (change)="onToggle()"
    />
    <span class="slider"></span>
</label>
