@if (label()) {
    <app-tooltip [required]="required()" [tooltipText]="tooltipText()" [label]="label()" [icon]="icon()" />
}

<div class="segmented" [ngClass]="'segmented--mod-' + mod()">
    @for (option of options(); track option.value) {
        <button
            type="button"
            class="segmented__item"
            [class.segmented__item--active]="option.value === value()"
            (click)="select(option)"
        >
            <span class="segmented__radio" [class.segmented__radio--active]="option.value === value()"></span>
            <span class="segmented__label">
                {{ option.label }}
            </span>
        </button>
    }
</div>
