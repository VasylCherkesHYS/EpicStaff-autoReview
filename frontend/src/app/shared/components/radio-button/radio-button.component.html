@if (label()) {
    <app-tooltip
        [required]="required()"
        [tooltipText]="tooltipText()"
        [label]="label()"
        [icon]="icon()"
    />
}

@if (mod() === 'segmented') {
    <div
        class="segmented"
        [class.segmented--disabled]="isDisabled()"
        [style.--option-count]="options().length"
    >
        <div
            class="segmented__slider"
            [style.transform]="sliderTransform()"
        ></div>

        @for (option of options(); track option.value) {
            <button
                type="button"
                class="segmented__option"
                [class.segmented__option--active]="value() === option.value"
                [disabled]="isDisabled()"
                (click)="select(option)"
            >
                {{ option.label ?? option.name }}
            </button>
        }
    </div>
} @else {
    <div
        class="radio"
        [class.small]="mod() === 'small'"
        [class.default]="mod() === 'default'"
        [class.radio--disabled]="isDisabled()"
    >
        @for (option of options(); track option.value; let count = $count) {
            <div
                class="item"
                [style.width]="`calc(100% / ${count})`"
                [class.active]="option.value === value()"
                (click)="select(option)"
            >
                {{ option.label ?? option.name }}
            </div>
        }
    </div>
}
