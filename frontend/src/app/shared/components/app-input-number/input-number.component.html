@if (label()) {
    <app-tooltip
        [required]="required()"
        [tooltipText]="tooltipText()"
        [label]="label()"
        [icon]="icon()"
    />
}

<div
    class="input__wrapper"
    [class.input__wrapper--invalid]="isInvalid()"
    [class.input__wrapper--warning]="isAboveWarning()"
    (mouseenter)="hovered.set(true)"
    (mouseleave)="hovered.set(false)"
>
    @if (hovered() || alwaysShowSteps()) {
        <button
            type="button"
            class="input__step input__step--minus"
            (mousedown)="onStep(-1); $event.preventDefault()"
            [disabled]="isDisabled() || !canStepDown()"
        >
            −
        </button>
    }

    <input
        type="number"
        class="input"
        [ngClass]="'input--mod-' + mod()"
        [placeholder]="placeholder()"
        [ngModel]="value()"
        (ngModelChange)="onInputChange($event)"
        (blur)="onTouched()"
        (keydown)="onKeyDown($event)"
        [disabled]="isDisabled()"
    />

    @if (hovered() || alwaysShowSteps()) {
        <button
            type="button"
            class="input__step input__step--plus"
            (mousedown)="onStep(1); $event.preventDefault()"
            [disabled]="isDisabled() || !canStepUp()"
        >
            +
        </button>
    }
</div>

@if (isAboveMax() && errorMessage()) {
    <small class="input__hint input__hint--error">{{ errorMessage() }}</small>
} @else if (isBelowMin()) {
    <small class="input__hint input__hint--error">Minimum value is {{ min() }}.</small>
} @else if (isAboveWarning() && warningMessage()) {
    <small class="input__hint input__hint--warning">{{ warningMessage() }}</small>
}
