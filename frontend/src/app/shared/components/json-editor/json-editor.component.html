<!-- Editor Header -->
@if (showHeader) {
    <div class="editor-header">
        <div class="left-section">
            <span class="editor-title">
                <app-svg-icon
                    icon="brackets"
                    size="1.2rem"
                    class="json-icon"
                />
                {{ title }}
            </span>
            @if (!jsonIsValid) {
                <span class="validation-message"> Invalid JSON format </span>
            }
        </div>
        <div class="right-section">
            @if (collapsible) {
                <app-svg-icon
                    class="action-icon"
                    [icon]="collapsed ? 'preview' : 'preview-hidden'"
                    size="1rem"
                    (click)="onToggle()"
                />
            }
            @if (allowCopy) {
                <app-svg-icon
                    class="action-icon"
                    icon="copy"
                    size="1rem"
                    (click)="onCopy()"
                />
            }
        </div>
    </div>
}

<!-- Editor Container -->
<div
    class="editor-container"
    [class.collapsed]="collapsible && collapsed"
    [class.expanded]="collapsible && !collapsed"
    #editorContainer
>
    @if (!collapsible || !collapsed) {
        <ngx-monaco-editor
            [options]="editorOptions"
            [(ngModel)]="jsonData"
            (ngModelChange)="onJsonChange($event)"
            (onInit)="onEditorInit($event)"
            class="monaco-editor"
            [style.height]="fullHeight ? '100%' : editorHeight + 'px'"
        ></ngx-monaco-editor>
    }

    <!-- Loading Overlay -->
    @if (!editorLoaded) {
        <div class="editor-loading-overlay">
            <div class="spinner"></div>
            <span>Loading editor...</span>
        </div>
    }
</div>

<!-- Resize Handle with the directive -->
@if (!fullHeight) {
    <div
        class="editor-resize-handle"
        appResizable
        (heightChange)="onResize($event)"
    >
        <div class="little-handle"></div>
    </div>
}
