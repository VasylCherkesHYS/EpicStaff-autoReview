<!-- pagination-controls.component.html -->
<nav
    class="pagination"
    aria-label="Pagination"
>
    <button
        class="page-btn prev"
        (click)="prev()"
        [disabled]="currentPage === 1"
    >
        Prev
    </button>

    <ul class="page-list">
        @for (p of pages; track p) {
            <li [class.ellipsis]="p === '…'">
                @if (p !== '…') {
                    <button
                        class="page-btn"
                        [class.active]="p === currentPage"
                        (click)="goTo(p)"
                    >
                        {{ p }}
                    </button>
                } @else {
                    <span class="dots">…</span>
                }
            </li>
        }
    </ul>

    <button
        class="page-btn next"
        (click)="next()"
        [disabled]="currentPage === totalPages"
    >
        Next
    </button>
</nav>
