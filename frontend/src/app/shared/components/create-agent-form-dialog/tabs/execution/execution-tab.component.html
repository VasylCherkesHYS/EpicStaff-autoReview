<div
    class="form-section"
    [formGroup]="form()"
>
    <h3 class="section-title">
        EXECUTION SETTINGS
    </h3>
    <div class="form-group">
        <app-slider-with-stepper
            formControlName="max_iter"
            label="Maximum Iterations"
            tooltipText="The maximum number of iterations the agent will perform before stopping."
            [min]="1"
            [max]="30"
            [step]="1"
            [decimals]="0"
        />
    </div>

    <div class="form-group">
        <app-slider-with-stepper
            formControlName="max_rpm"
            label="Maximum Requests Per Minute (RPM)"
            tooltipText="Set the maximum number of API requests the agent can make per minute. Higher values allow more throughput but may increase costs."
            [min]="1"
            [max]="30"
            [step]="1"
            [decimals]="0"
        />
    </div>

    <div class="form-group">
        <app-slider-with-stepper
            formControlName="max_execution_time"
            label="Maximum Execution Time (seconds)"
            tooltipText="The maximum time in seconds the agent will run before timing out."
            [min]="1"
            [max]="600"
            [step]="1"
            [decimals]="0"
        />
    </div>

    <div class="form-group">
        <app-slider-with-stepper
            formControlName="max_retry_limit"
            label="Maximum Retry Limit"
            tooltipText="The maximum number of times the agent will retry failed operations."
            [min]="1"
            [max]="10"
            [step]="1"
            [decimals]="0"
        />
    </div>
</div>
