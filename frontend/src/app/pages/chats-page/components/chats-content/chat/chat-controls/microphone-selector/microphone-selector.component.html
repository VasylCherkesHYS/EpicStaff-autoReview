<!-- microphone-selector.component.html -->
<div class="microphone-selector">
    <button
        class="device-button"
        (click)="toggleDevicesList($event)"
        [class.disabled]="!isInitialized || !hasDevices"
    >
        <!-- Loading spinner when not initialized -->
        @if (!isInitialized) {
            <div class="spinner">
                <app-svg-icon
                    icon="loader"
                    size="1rem"
                    class="ti-spin"
                />
            </div>
        }

        <!-- No microphones found message -->
        @if (isInitialized && !hasDevices) {
            <span class="device-label">No microphones found</span>
        }

        <!-- Selected device when loaded -->
        @if (isInitialized && hasDevices) {
            <span class="device-label">
                {{ getSelectedDeviceLabel() }}
            </span>
        }

        <!-- Dropdown chevron -->
        @if (isInitialized && hasDevices) {
            <span
                class="chevron"
                [class.open]="showDevicesList"
            >
                <app-svg-icon
                    icon="chevron-down"
                    size="1rem"
                />
            </span>
        }
    </button>

    <!-- Devices dropdown -->
    @if (showDevicesList && isInitialized && hasDevices) {
        <div class="devices-dropdown">
            @for (device of audioInputDevices; track device) {
                <div
                    class="device-item"
                    (click)="selectDevice(device.deviceId)"
                    [class.selected]="selectedDeviceId === device.deviceId"
                >
                    @if (selectedDeviceId === device.deviceId) {
                        <app-svg-icon
                            icon="check"
                            size="1rem"
                        />
                    }
                    <span>{{ device.label || 'Unnamed device' }}</span>
                </div>
            }
        </div>
    }
</div>
