<div
    class="config-selector"
    appClickOutside
    (appClickOutside)="isOpen = false"
>
    <!-- <label *ngIf="label">{{ label }}</label> -->
    <div
        class="selector"
        [class.disabled]="disabled"
        (click)="toggleDropdown()"
    >
        <div class="selected-config">{{ getSelectedConfigName() }}</div>
        <div
            class="selector-arrow"
            [class.open]="isOpen"
        >
            <app-svg-icon
                icon="chevron-down"
                size="10px"
            />
        </div>
    </div>

    @if (isOpen) {
        <div class="dropdown-menu">
            @if (loading) {
                <div class="dropdown-item loading">Loading configurations...</div>
            }
            @if (!loading) {
                <!-- None option -->
                <div
                    class="dropdown-item"
                    [class.selected]="selectedConfigId === null"
                    (click)="selectConfig(null)"
                >
                    None
                </div>
                <!-- Config options -->
                @for (config of configs; track config) {
                    <div
                        class="dropdown-item"
                        [class.selected]="config.id === selectedConfigId"
                        (click)="selectConfig(config.id)"
                    >
                        <span class="config-name">{{ config.custom_name }} ({{ config.model_name }})</span>
                        <span class="item-actions">
                            <app-svg-icon
                                icon="settings"
                                size="16px"
                                class="edit-icon"
                                (click)="onEditConfig($event, config.id)"
                                aria-label="Edit configuration"
                            />
                            <app-svg-icon
                                icon="x"
                                size="16px"
                                class="delete-icon"
                                (click)="onDeleteConfig($event, config.id)"
                                aria-label="Delete configuration"
                            />
                        </span>
                    </div>
                }
                <!-- Create new option -->
                <div
                    class="dropdown-item create-new"
                    (click)="onCreateNew()"
                >
                    Create New Configuration
                </div>
            }
        </div>
    }
</div>
