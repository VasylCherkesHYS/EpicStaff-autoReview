<div class="config-selector" appClickOutside (appClickOutside)="isOpen = false">
    <!-- <label *ngIf="label">{{ label }}</label> -->
    <div class="selector" [class.disabled]="disabled" (click)="toggleDropdown()">
        <div class="selected-config">{{ getSelectedConfigName() }}</div>
        <div class="selector-arrow" [class.open]="isOpen">
            <app-svg-icon icon="chevron-down" size="10" />
        </div>
    </div>

    <div class="dropdown-menu" *ngIf="isOpen">
        <div *ngIf="loading" class="dropdown-item loading">Loading configurations...</div>

        <ng-container *ngIf="!loading">
            <!-- None option -->
            <div class="dropdown-item" [class.selected]="selectedConfigId === null" (click)="selectConfig(null)">
                None
            </div>

            <!-- Config options -->
            <div
                *ngFor="let config of configs"
                class="dropdown-item"
                [class.selected]="config.id === selectedConfigId"
                (click)="selectConfig(config.id)"
            >
                <span class="config-name">{{ config.custom_name }} ({{ config.model_name }})</span>
                <app-svg-icon
                    icon="x"
                    size="16"
                    class="delete-icon"
                    (click)="onDeleteConfig($event, config.id)"
                    aria-label="Delete configuration"
                />
            </div>

            <!-- Create new option -->
            <div class="dropdown-item create-new" (click)="onCreateNew()">
                Create New Configuration
            </div>
        </ng-container>
    </div>
</div>
