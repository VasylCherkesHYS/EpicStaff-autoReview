<div class="chats">
    <app-page-header
        headerTitle="Chats"
        [showCreate]="false"
        [showFavoriteToggle]="false"
        [showSearch]="false"
        [showFilter]="false"
        [showSort]="false"
    ></app-page-header>

    <main class="chats__body">
        @if (isLoading()) {
            <div class="chats__loading-container">
                <app-spinner
                    [text]="'Loading chats...'"
                    [accentColor]="'#6562f5'"
                    [isOverlay]="false"
                ></app-spinner>
            </div>
        }

        @if (!isLoading()) {
            <app-chats-sidebar [agents]="agentsList()"></app-chats-sidebar>
            <app-chats-content></app-chats-content>
        }
    </main>
</div>
