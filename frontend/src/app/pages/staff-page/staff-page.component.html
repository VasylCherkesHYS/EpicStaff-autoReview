<div class="staff-page-container">
    <div class="header-section">
        <header class="header">
            <div
                class="header-titles"
                appHideInlineSubtitleOnOverflow
            >
                <h1 class="title">
                    Staff
                    <span class="subtitle-inline">Manage your AI agents and their capabilities.</span>
                    <app-unsaved-indicator [show]="hasUnsavedChanges"></app-unsaved-indicator>
                </h1>
            </div>
            <div class="header-actions">
                <!-- <app-filters-list
          [searchPlaceholder]="'Search agents...'"
          [showTags]="true"
        ></app-filters-list> -->
                <app-save-with-indicator
                    [isSaving]="isSaving"
                    [disabled]="isSaving || !hasUnsavedChanges"
                    [hasUnsavedChanges]="hasUnsavedChanges"
                    (save)="onSave()"
                ></app-save-with-indicator>

                <app-button
                    type="primary"
                    class="btn-primary create-btn"
                    [leftIcon]="'plus'"
                    (click)="openCreateAgentDialog()"
                >
                    Create agent
                </app-button>
            </div>
        </header>
    </div>
    <section class="body">
        <app-agents-table
            [isSaving]="isSaving"
            (dirtyChange)="hasUnsavedChanges = $event"
            (autoSaveRequested)="onSave()"
        ></app-agents-table>
    </section>
</div>
