<div class="llm-selector" appClickOutside (appClickOutside)="isOpen = false">
    <label *ngIf="label" class="selector-label">{{ label }}</label>

    <div
        class="selector"
        [class.disabled]="disabled"
        [class.loading]="loading"
        [class.open]="isOpen"
        (click)="toggleDropdown()"
    >
        <div class="selected-llm">
            <span *ngIf="loading" class="placeholder">Loading LLMs...</span>
            <span *ngIf="!loading && !selectedConfig" class="placeholder">{{ placeholder }}</span>
            <span *ngIf="!loading && selectedConfig" class="selected-text">
                <span class="model-name">
                    {{ selectedConfig.modelDetails?.name || 'Unknown Model' }}
                </span>
                <span class="config-name">{{ selectedConfig.custom_name }}</span>
            </span>
        </div>

        <div class="selector-arrow" [class.open]="isOpen">
            <app-svg-icon icon="chevron-down" size="1rem" />
        </div>
    </div>

    <div class="dropdown-menu" *ngIf="isOpen">
        <div class="dropdown-item" [class.selected]="value === null" (click)="selectLlm(null)">
            <span class="option-text">No LLM Selected</span>
        </div>

        <div
            *ngFor="let llm of llmConfigs"
            class="dropdown-item"
            [class.selected]="llm.id === value"
            (click)="selectLlm(llm)"
        >
            <span class="model-name">{{ llm.modelDetails?.name || 'Unknown Model' }}</span>
            <span class="config-name">{{ llm.custom_name }}</span>
        </div>
    </div>
</div>
