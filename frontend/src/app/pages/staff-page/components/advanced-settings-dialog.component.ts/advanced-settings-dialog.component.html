<div class="dialog-container">
    <!-- Header Section -->
    <div class="header">
        <div class="icon-and-title">
            <i class="ti ti-settings"></i>
            <h2 class="dialog-title">
                Advanced Settings for {{ data.role }}
            </h2>
        </div>
        <app-icon-button icon="ui/x" ariaLabel="Close dialog" size="2rem" (onClick)="closeAndApply()">
        </app-icon-button>
    </div>
    <div class="tabs">
        @for (tab of tabs; track tab.id) {
            <app-tab-button
                [mod]="'sm'"
                [active]="tab.id === activeTab()"
                (click)="activeTab.set(tab.id)"
            >
                {{ tab.label }}
            </app-tab-button>
            @if (!$last) {
                <div class="divider">/</div>
            }
        }
    </div>

    <div class="scrollable-content">
        <app-general-tab
            class="tab-content"
            [class.visible-tab]="activeTab() === TabId.GENERAL"
            [form]="form"
            [combinedLLMs]="combinedLLMs"
        />
        <app-rag-tab
            class="tab-content"
            [class.visible-tab]="activeTab() === TabId.RAG"
            [form]="form"
            [allKnowledgeSources]="allKnowledgeSources"
            [agentRags]="agentRags"
            [searchConfigs]="data.search_configs"
        />
        <!--    Might be used in the future-->
        <!--    <app-llm-params-tab-->
        <!--        class="tab-content"-->
        <!--        [class.visible-tab]="activeTab() === TabId.LLM_PARAMS"-->
        <!--        [form]="form"-->
        <!--    />-->
        <app-execution-tab
            class="tab-content"
            [class.visible-tab]="activeTab() === TabId.EXECUTION"
            [form]="form"
        />
        <app-advanced-tab
            class="tab-content"
            [class.visible-tab]="activeTab() === TabId.ADVANCED"
            [form]="form"
        />
    </div>

    <!-- Action Buttons -->
    <div class="actions">
        <button class="btn-cancel" (click)="dialogRef.close()">Cancel</button>
        <button class="btn-save" [disabled]="form.invalid" (click)="save()">Save Changes</button>
    </div>
</div>
