<div class="panel-header">
    <div class="header-naming-container">
        <div class="icon">
            <app-svg-icon icon="heartbeat" size="20px" />
        </div>
        <p class="text">Session execution</p>
    </div>

    <button [disabled]="!hasNextSession" (click)="goToNextSession()" class="btn-switch-session">
        <div class="icon-arrow">
            <app-svg-icon icon="chevron-down" size="20px" />
        </div>
    </button>

    <div class="session-dropdown-wrapper">
        <button class="session-dropdown-trigger" (click)="toggleDropdown()">
            <span class="session-dropdown-trigger__label">{{ selectedSessionLabel }}</span>
            <app-svg-icon icon="chevron-down" size="16px" />
        </button>

        @if (isDropdownOpen) {
            <div class="session-dropdown-overlay" (click)="closeDropdown()"></div>
            <div class="session-dropdown">
                <div class="session-dropdown__search">
                    <input
                        type="text"
                        placeholder="Search by ID..."
                        [(ngModel)]="searchQuery"
                        (click)="$event.stopPropagation()"
                        class="session-dropdown__input"
                    />
                </div>
                <div class="session-dropdown__list">
                    @for (session of filteredSessions; track session.id) {
                        <button
                            class="session-dropdown__item"
                            [class.active]="session.id.toString() === selectedSessionId"
                            (click)="onSessionChange(session.id.toString())"
                        >
                            <span class="session-dropdown__item-id">ID {{ session.id }}</span>
                            <span class="session-dropdown__item-time">{{ getTimeAgo(session.status_updated_at) }}</span>
                        </button>
                    }
                    @if (filteredSessions.length === 0) {
                        <div class="session-dropdown__empty">No sessions found</div>
                    }
                </div>
            </div>
        }
    </div>

    <button [disabled]="!hasPreviousSession" (click)="goToPreviousSession()" class="btn-switch-session">
        <div class="icon-arrow">
            <app-svg-icon icon="chevron-up" size="20px" />
        </div>
    </button>

    <button
        [disabled]="!selectedSessionId"
        (click)="openSessionPage()"
        matTooltip="Open full session page"
        class="btn-go-to-arrow"
    >
        <div>
            <app-svg-icon icon="arrow-up" size="15px" class="arrow-up-custom" />
        </div>
    </button>

    <button (click)="close.emit()" class="btn-switch-session">
        <div>
            <app-svg-icon icon="x" size="20px" />
        </div>
    </button>
</div>

<div class="panel-body">
    @if (selectedSessionId && graphId) {
        <app-graph-messages
            [graphId]="graphId"
            [sessionId]="selectedSessionId"
            class="graph-messages-list"
        ></app-graph-messages>
    } @else if (sessions.length === 0) {
        <div class="panel-body__empty">
            Click
            <span class="panel-body__run-badge">
                <app-svg-icon icon="player-play-filled" size="0.875rem" />
                Run
            </span>
            button to see session messages
        </div>
    }
</div>
