<div *ngIf="!selectedFile">
    <span class="noFiles"> Please add the files and select one of them </span>
</div>

<div *ngIf="selectedFile">
    <div class="file-info">
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            ></path>
            <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <span class="file-name">{{ selectedFile?.file?.file?.name }}</span>
        <span class="file-size">
            {{ ((selectedFile?.file?.file?.size ?? 0) / 1024).toFixed(0) }} KB
        </span>
        <span class="file-status invalid" *ngIf="!selectedFile?.file?.isValid">
            Invalid file type
        </span>
    </div>

    <!-- Per-file chunk settings -->
    <div class="file-settings" *ngIf="selectedFile?.file?.isValid">
        <div class="setting-row">
            <div class="setting-group">
                <div class="setting-label">
                    <label>Chunk Strategy</label>
                    <app-help-tooltip
                        text="Choose how to split your document into chunks. Different strategies work better for different document types."
                    ></app-help-tooltip>
                </div>
                <select
                    class="chunk-strategy-select"
                    [value]="selectedFile?.file?.chunkStrategy"
                    (change)="
                        updateFileSettings(
                            selectedFile!.index,
                            'chunkStrategy',
                            $any($event).target.value
                        )
                    "
                >
                    <option
                        *ngFor="let strategy of chunkStrategies"
                        [value]="strategy.value"
                    >
                        {{ strategy.label }}
                    </option>
                </select>
            </div>

            <div class="setting-group">
                <div class="setting-label">
                    <label>Chunk Size</label>
                    <app-help-tooltip
                        text="The maximum size of each document chunk. Smaller chunks are more precise but may lose context. Larger chunks preserve more context but may be less precise."
                    ></app-help-tooltip>
                </div>
                <input
                    type="number"
                    [value]="selectedFile?.file?.chunkSize"
                    min="1"
                    [max]="maxChunkSize"
                    [class.invalid-input]="
                        selectedFile?.file?.hasChunkSizeError
                    "
                    (change)="
                        updateFileSettings(
                            selectedFile!.index,
                            'chunkSize',
                            $any($event).target.value
                        )
                    "
                    (keydown.enter)="$event.preventDefault()"
                />
            </div>

            <div class="setting-group">
                <div class="setting-label">
                    <label>Chunk Overlap</label>
                    <app-help-tooltip
                        text="The number of characters or tokens that overlap between chunks. Helps maintain context between chunks. Must be smaller than chunk size."
                    ></app-help-tooltip>
                </div>
                <input
                    type="number"
                    [value]="selectedFile?.file?.overlapSize"
                    min="0"
                    [max]="maxOverlapSize"
                    [class.invalid-input]="
                        selectedFile?.file?.hasChunkSizeError
                    "
                    (change)="
                        updateFileSettings(
                            selectedFile!.index,
                            'overlapSize',
                            $any($event).target.value
                        )
                    "
                    (keydown.enter)="$event.preventDefault()"
                />
            </div>
        </div>

        <!-- Chunk size validation error message -->
        <div
            class="chunk-size-error"
            *ngIf="selectedFile?.file?.hasChunkSizeError"
        >
            Chunk size must be greater than overlap size
        </div>
    </div>

    <!-- additional parameters -->
    <!-- <div class="setting-label">
        <label>Additional params</label>
    </div> -->

    <!-- <div class="setting-group">
        <div class="setting-label">
            <label>Csv strategy</label>
        </div>
        <input
            type="number"
            [value]="selectedFile?.file?.additionalParams?.csvStrategy?.headers_level"
            min="1"
            [max]="20"
            [class.invalid-input]="selectedFile?.file?.hasChunkSizeError"
            (change)="
                updateFileSettings(
                    selectedFile!.index,
                    'overlapSize',
                    $any($event).target.value
                )
            "
            (keydown.enter)="$event.preventDefault()"
        />
    </div> -->
    <div class="btn-container">
        <app-button type="primary" (click)="onClickPreview()">
            <span>Chunk Preview</span>
        </app-button>
    </div>

    <!-- <div *ngIf="previewChunks() as preview" style="max-width: 500px; background: #0f0f0f">
        <ul>
            @for (result of preview.results; track result.text) {
                <li>
                    <span>{{result.id}}</span>
                    <p>{{result.text}}</p>
                </li>
             }
        </ul>
    </div> -->

    <div
        *ngIf="
            isLoading || (previewChunks() && previewChunks()?.results?.length)
        "
        class="chunk-preview"
    >
        <app-chunk-preview
            [previewChunks]="previewChunks()"
            [isLoading]="isLoading"
        ></app-chunk-preview>
    </div>
</div>
