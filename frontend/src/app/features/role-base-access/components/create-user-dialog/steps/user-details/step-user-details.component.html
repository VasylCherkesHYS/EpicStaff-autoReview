<form
    [formGroup]="form"
    class="form"
>
    <div class="primary">
        <!--        <div class="control">-->
        <!--            <label class="label">-->
        <!--                Full Name <span class="required">*</span>-->
        <!--                <app-help-tooltip-->
        <!--                    [text]="''"-->

        <!--            </label>-->

        <!--            <app-custom-input-->

        <!--                formControlName="full_name"-->
        <!--            />-->
        <!--        </div>-->
        <!--        <app-validation-errors [control]="form.get('full_name')!" />-->
        <div class="control">
            <label class="label">
                Email <span class="required">*</span>
                <app-help-tooltip
                    [text]="'The user\'s login email address. Must be unique across the system.'"
                    position="right"
                ></app-help-tooltip>
            </label>

            <app-custom-input
                placeholder="Enter user email..."
                formControlName="email"
            />
        </div>
        <app-validation-errors [control]="form.get('email')!" />
        @if (!editMode()) {
            <div class="control">
                <label class="label">
                    Password
                    <span class="required">*</span>
                    <app-help-tooltip
                        [text]="'Minimum 8 characters. The user can change it after their first login.'"
                        position="right"
                    ></app-help-tooltip>
                </label>

                <app-custom-input
                    type="password"
                    [placeholder]="editMode() ? 'Leave blank to keep current...' : 'Enter user password...'"
                    formControlName="password"
                />
            </div>
            <app-validation-errors [control]="form.get('password')!" />
            <app-password-strength [password]="password" />
        }
        <!--        <div class="control top">-->
        <!--            <label class="label">-->
        <!--                Picture-->
        <!--                <app-help-tooltip-->
        <!--                    [text]="''"-->
        <!--                    position="right"-->
        <!--                ></app-help-tooltip>-->
        <!--            </label>-->
        <!--            <app-avatar-upload (imageChange)="form.patchValue({ picture: $event })" />-->
        <!--        </div>-->
    </div>
    @if (canToggleSuperadmin()) {
        <div class="secondary">
            <label class="label">
                Make Superadmin
                <app-help-tooltip
                    [text]="'Superadmins have full access to all organizations and system settings.'"
                    position="right"
                ></app-help-tooltip>
            </label>

            <app-toggle-switch formControlName="superadmin" />
        </div>
    }
</form>
