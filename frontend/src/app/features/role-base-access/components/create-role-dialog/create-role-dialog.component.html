<div class="dialog">
    <!-- HEADER -->
    <div class="header">
        <span class="title">{{ isEditMode ? 'Edit Role' : 'Create Role' }}</span>
        <div class="actions">
            <app-button
                type="outline-primary"
                (click)="onCancel()"
            >
                Cancel
            </app-button>
            <app-button
                type="primary"
                [disabled]="isSubmitting()"
                (click)="onSubmit()"
            >
                {{ isEditMode ? 'Save' : 'Create' }}
            </app-button>
        </div>
    </div>

    <!-- SUBHEADER: name + description -->
    <form
        class="subheader"
        [formGroup]="form"
    >
        <div class="control">
            <label class="label">Role Name <span class="required">*</span></label>
            <app-custom-input
                placeholder="Enter the name..."
                formControlName="name"
            />
        </div>
        <app-validation-errors [control]="form.get('name')!" />
        <div class="control">
            <label class="label">Description</label>
            <app-custom-input
                placeholder="Enter the description..."
                formControlName="description"
            />
        </div>
        <app-validation-errors [control]="form.get('description')!" />
    </form>

    <!-- CONTENT: permissions -->
    <div class="content">
        <app-permissions-table
            [selectedPermissions]="selectedPermissions()"
            (permissionToggle)="onPermissionToggle($event)"
            (selectAllClick)="onSelectAll()"
            (clearAllClick)="onClearAll()"
            (groupSelectAllClick)="onGroupSelectAll($event)"
            (groupClearClick)="onGroupClear($event)"
        />
    </div>
</div>
