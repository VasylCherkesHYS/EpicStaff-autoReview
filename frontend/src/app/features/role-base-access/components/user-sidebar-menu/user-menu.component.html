<div class="user-menu-panel">
    <!-- User header -->
    <div class="user-header">
        <div class="user-avatar">{{ user().initials }}</div>
        <div class="user-info">
            <div class="user-name">{{ user().name }}</div>
            <div class="user-role">{{ user().role }}</div>
        </div>
    </div>

    <div class="menu-divider"></div>

    <!-- Organizations section -->
    <div class="menu-section">
        <div class="section-label">Organizations</div>
        <ul class="org-list">
            @for (org of organizations(); track org.id) {
                <li class="org-row" [class.active]="org.active" (click)="onOrgClick(org.id)">
                    <div class="org-avatar">{{ org.initial }}</div>
                    <span class="org-name">{{ org.name }}</span>
                </li>
            }
        </ul>
    </div>

    <div class="menu-divider"></div>

    <!-- Navigation section -->
    <div class="menu-section">
        <div class="section-label">Navigation</div>
        <div class="nav-list">
            <button class="nav-item" (click)="onWorkspaceClick()">
                <app-svg-icon size="20px" icon="workspace" class="nav-icon" />
                <span class="nav-label">Workspace</span>
            </button>

            <button class="nav-item" (click)="onProfileClick()">
                <app-svg-icon size="20px" icon="profile" class="nav-icon" />
                <span class="nav-label">My Profile</span>
            </button>
        </div>
    </div>

    <div class="menu-divider"></div>

    <div class="menu-section">
        <button class="nav-item nav-item--danger" (click)="onSignOutClick()">
            <app-svg-icon size="20px" icon="sign-out" class="nav-icon" />
            <span class="nav-label">Sign out</span>
        </button>
    </div>
</div>
