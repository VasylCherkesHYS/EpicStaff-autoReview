<div class="dialog">
    <div class="header">
        <span class="title">{{ step() === 'verify' ? 'Verify your identity' : 'Set new password' }}</span>
        <button
            class="close"
            type="button"
            (click)="onCancel()"
        >
            <app-svg-icon
                icon="x"
                size="18px"
            />
        </button>
    </div>

    @if (step() === 'verify') {
        <form
            class="body"
            [formGroup]="verifyForm"
            [appServerErrors]="verifyForm"
            [errorsRef]="verifyErrorsRef"
        >
            <app-custom-input
                label="Current Password"
                type="password"
                placeholder="Enter value..."
                formControlName="current_password"
            />
            <app-validation-errors [control]="verifyForm.get('current_password')!" />
        </form>
    } @else {
        <form
            class="body"
            [formGroup]="newPasswordForm"
            [appServerErrors]="newPasswordForm"
            [errorsRef]="newPasswordErrorsRef"
        >
            <app-custom-input
                label="New Password"
                type="password"
                placeholder="Enter value..."
                formControlName="new_password"
            />
            <app-validation-errors [control]="newPasswordForm.get('new_password')!" />
            <app-password-strength [password]="newPassword" />

            <app-custom-input
                label="Confirm New Password"
                type="password"
                placeholder="Repeat the password..."
                formControlName="confirm_password"
            />
            <app-validation-errors [control]="newPasswordForm.get('confirm_password')!" />
        </form>
    }

    <div class="footer">
        <app-button
            type="outline-primary"
            (click)="onCancel()"
            >Cancel</app-button
        >
        @if (step() === 'verify') {
            <app-button
                type="primary"
                [disabled]="loading() || verifyForm.invalid"
                (click)="onVerify()"
                >Continue</app-button
            >
        } @else {
            <app-button
                type="primary"
                [disabled]="loading() || newPasswordForm.invalid"
                (click)="onSubmit()"
                >Continue</app-button
            >
        }
    </div>
</div>
