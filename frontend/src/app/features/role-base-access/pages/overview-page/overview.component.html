<div class="overview-page">
    <div class="overview-header">
        <div class="header">
            <div
                class="header-titles"
                appHideInlineSubtitleOnOverflow
            >
                <h1 class="title">
                    Overview
                    <span class="subtitle-inline"
                        >Here you can view overall insights, along with the list of organizations, users, and their
                        access permissions.</span
                    >
                </h1>
            </div>
        </div>
        <nav class="overview-tabs">
            @if (currentUserService.canManageOrgs()) {
                <a
                    routerLink="main"
                    routerLinkActive="active"
                    class="overview-tab"
                >
                    <app-svg-icon
                        size="18px"
                        icon="home"
                    />
                    Main
                </a>
                <span class="tab-divider">/</span>
                <a
                    routerLink="organizations"
                    routerLinkActive="active"
                    class="overview-tab"
                >
                    <app-svg-icon
                        size="18px"
                        icon="buildings"
                    />
                    Organizations
                </a>
                <span class="tab-divider">/</span>
            }
            @if (currentUserService.canManageUsers()) {
                <a
                    routerLink="users"
                    routerLinkActive="active"
                    class="overview-tab"
                >
                    <app-svg-icon
                        size="18px"
                        icon="profile"
                    />
                    Users
                </a>
            }
        </nav>
    </div>
    <div class="overview-content">
        <router-outlet></router-outlet>
    </div>
</div>
