<div class="stats-row">
    @if (isStatsLoading()) {
        <app-loading-spinner size="md" message="Loading data..." />
    } @else {
        @for (stat of stats(); track stat.label) {
            <app-stat-card [data]="stat" />
        }
    }
</div>

<!-- Organizations -->
<div class="section">
    <div class="header">
        <h2 class="title">Organizations</h2>
        <app-button type="outline-primary" mod="small" leftIcon="plus" (click)="onCreateOrganization()"
            >Create Organization</app-button
        >
    </div>

    @if (isOrgsLoading()) {
        <app-loading-spinner size="lg" message="Loading Organizations..." />
    } @else {
        <div class="orgs-grid">
            @for (org of organizations(); track org.id) {
                <app-org-card [organization]="org" />
            }
            <!-- Create New Team -->
            <div class="org-card-create" (click)="onCreateOrganization()">
                <app-svg-icon class="plus" icon="plus" size="30px" />
                <span class="label">Create New Organization</span>
            </div>
        </div>
    }
</div>
