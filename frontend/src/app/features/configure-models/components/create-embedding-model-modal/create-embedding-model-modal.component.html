<div class="create-model">
    <div class="create-model__header">
        <h3 class="create-model__title">{{ isEditMode ? 'Edit Embedding Model' : 'Add Embedding Model' }}</h3>
        <button
            type="button"
            class="create-model__close-btn"
            (click)="onClose()"
        >
            <app-svg-icon
                icon="x"
                size="0.875rem"
            />
        </button>
    </div>

    <div
        class="create-model__content"
        [formGroup]="form"
    >
        <div class="create-model__field">
            <app-tooltip
                [required]="true"
                [tooltipText]="'Provider'"
                [label]="'Provider'"
            />
            <div class="create-model__provider">
                <app-svg-icon
                    [icon]="getProviderIcon(provider.name)"
                    size="1rem"
                />
                <span>{{ provider.name | uppercase }}</span>
            </div>
        </div>

        <div class="create-model__field">
            <app-custom-input
                placeholder="Enter model name"
                tooltipText="Model name"
                label="Model Name"
                [required]="true"
                formControlName="name"
            />
            <app-validation-errors [control]="form.get('name')!" />
        </div>

        <div class="create-model__field">
            <app-custom-input
                label="Base URL"
                tooltipText="Base URL"
                placeholder="e.g. https://api.openai.com/v1"
                formControlName="baseUrl"
            />
            <app-validation-errors [control]="form.get('baseUrl')!" />
        </div>

        <div class="create-model__field">
            <app-custom-input
                label="Deployment"
                tooltipText="Deployment"
                placeholder="Enter deployment name"
                formControlName="deployment"
            />
        </div>

        <div class="create-model__field create-model__field--inline">
            <app-toggle-switch
                label="Visible"
                tooltipText="Visible"
                formControlName="isVisible"
            />
        </div>
    </div>

    <div class="create-model__footer">
        <app-button
            type="outline-primary"
            (click)="onClose()"
            [disabled]="isSubmitting()"
        >
            Cancel
        </app-button>
        <app-button
            type="primary"
            (click)="onSubmit()"
            [disabled]="form.invalid || isSubmitting()"
        >
            {{
                isSubmitting()
                    ? isEditMode
                        ? 'Saving...'
                        : 'Adding...'
                    : isEditMode
                      ? 'Save Changes'
                      : 'Add Embedding Model'
            }}
        </app-button>
    </div>
</div>
