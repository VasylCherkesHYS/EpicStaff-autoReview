<div class="dialog">
    <div class="header">
        <h2 class="title">
            {{ title() }}
        </h2>
        <app-icon-button
            icon="x"
            ariaLabel="Close dialog"
            size="2rem"
            (onClick)="dialogRef.close()"
        >
        </app-icon-button>
    </div>

    <div
        class="form"
        [formGroup]="form"
    >
        <div>
            <app-llm-model-selector
                formControlName="realtime_model"
                label="Provider"
                placeholder="Select provider"
                tooltipText="The AI provider and model this configuration will use (e.g. OpenAI GPT-4o)"
                [provider]="ModelTypes.REALTIME"
                [required]="true"
                (modelChanged)="onModelChanged($event)"
            />
            <app-validation-errors [control]="form.get('realtime_model')!" />
        </div>
        <div>
            <app-custom-input
                formControlName="api_key"
                label="API Key"
                placeholder="Enter provider's API key"
                tooltipText="Your secret API key from the provider's dashboard. It will be stored securely."
                type="password"
            />
            <app-validation-errors [control]="form.get('api_key')!" />
        </div>
        <div>
            <app-custom-input
                formControlName="custom_name"
                label="Configuration Name"
                placeholder="Enter a custom name"
                tooltipText="A friendly name to identify this configuration across the app"
                [required]="true"
            />
            <app-validation-errors [control]="form.get('custom_name')!" />
        </div>
    </div>

    <div class="footer">
        <app-button
            type="outline-primary"
            (click)="onCancel()"
        >
            Cancel
        </app-button>
        <app-button
            type="primary"
            [disabled]="form.invalid || isSaving() || isLoading()"
            (click)="onSave()"
        >
            {{ saveLabel() }}
        </app-button>
    </div>
</div>
