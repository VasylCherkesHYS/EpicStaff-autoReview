<div class="dialog">
    <div class="header">
        <h2 class="title">
            {{ title() }}
        </h2>
        <app-icon-button icon="x" ariaLabel="Close dialog" size="2rem" (onClick)="dialogRef.close()"> </app-icon-button>
    </div>

    <div class="form" [formGroup]="form">
        <section class="section">
            <h3 class="title">MODEL INFORMATION</h3>
            <div>
                <app-llm-model-selector
                    formControlName="model"
                    label="Provider"
                    placeholder="Select provider"
                    tooltipText="The AI provider and model this configuration will use (e.g. OpenAI GPT-4o)"
                    [provider]="ModelTypes.LLM"
                    [required]="true"
                    (modelChanged)="onModelChanged($event)"
                />
                <app-validation-errors [control]="form.get('model')!" />
            </div>
            <div>
                <app-custom-input
                    formControlName="api_key"
                    label="API Key"
                    placeholder="Enter provider's API key"
                    tooltipText="Your secret API key from the provider's dashboard. It will be stored securely."
                    type="password"
                />
                <app-validation-errors [control]="form.get('api_key')!" />
            </div>
            <div>
                <app-custom-input
                    formControlName="custom_name"
                    label="Configuration Name"
                    placeholder="Enter a custom name"
                    tooltipText="A friendly name to identify this configuration across the app"
                    [required]="true"
                />
                <app-validation-errors [control]="form.get('custom_name')!" />
            </div>
        </section>

        <section class="section">
            <h3 class="title">API CONFIGURATION</h3>
            <app-key-value-list
                formControlName="headers"
                label="Header Configuration"
                tooltipText="Custom HTTP headers sent with every API request, e.g. for proxies or extra auth"
                namePlaceholder="Header name"
                valuePlaceholder="Header value"
            />
        </section>

        <section class="section">
            <h3 class="title">GENERATION PARAMETERS</h3>
            <div>
                <app-slider-with-stepper
                    formControlName="temperature"
                    [min]="0"
                    [max]="1"
                    [step]="0.1"
                    label="Temperature"
                    tooltipText="Controls randomness of responses. Lower = more deterministic, higher = more creative."
                />
                <app-validation-errors [control]="form.get('temperature')!" />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="top_p"
                    [min]="0.1"
                    [max]="1"
                    [step]="0.1"
                    label="Top P"
                    tooltipText="Nucleus sampling: only tokens whose cumulative probability reaches Top P are considered."
                />
                <app-validation-errors [control]="form.get('top_p')!" />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="presence_penalty"
                    label="Presence Penalty"
                    tooltipText="Penalises tokens that have already appeared, encouraging the model to introduce new topics."
                />
                <app-validation-errors [control]="form.get('presence_penalty')!" />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="frequency_penalty"
                    label="Frequency Penalty"
                    tooltipText="Penalises tokens proportionally to how often they appear, reducing repetition."
                />
                <app-validation-errors [control]="form.get('frequency_penalty')!" />
            </div>
        </section>

        <section class="section">
            <h3 class="title">TOKEN LIMITS & COMPLETION</h3>
            <div>
                <app-input-number
                    formControlName="max_tokens"
                    [min]="500"
                    [max]="2147483647"
                    label="Max Tokens"
                    tooltipText="Maximum number of tokens the model may generate in a single response"
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors [control]="form.get('max_tokens')!" />
            </div>
            <div>
                <app-input-number
                    formControlName="timeout"
                    [min]="1"
                    [max]="600"
                    label="Timeout (seconds)"
                    tooltipText="How long to wait for the model to respond before the request is cancelled"
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors [control]="form.get('timeout')!" />
            </div>
        </section>

        <section class="section">
            <h3 class="title">ADVANCED PARAMETERS</h3>
            <div>
                <app-input-number
                    formControlName="seed"
                    placeholder="random"
                    label="Seed"
                    tooltipText="Fixed seed for reproducible outputs. Leave empty to let the model pick randomly."
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors [control]="form.get('seed')!" />
            </div>
            <app-json-editor-form-field
                formControlName="logit_bias"
                label="Logit Bias (JSON)"
                tooltipText="JSON map of token IDs to bias values that adjust token probabilities"
                [writeValueAsJSON]="false"
            />
        </section>
    </div>

    <div class="footer">
        <app-button type="outline-primary" (click)="onCancel()"> Cancel </app-button>
        <app-button type="primary" [disabled]="form.invalid || isSaving() || isLoading()" (click)="onSave()">
            {{ saveLabel() }}
        </app-button>
    </div>
</div>
