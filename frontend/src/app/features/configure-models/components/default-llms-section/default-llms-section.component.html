<section class="default-llms">
    <header class="default-llms__header">
        <h3 class="default-llms__title">Default LLMs</h3>
        <p class="default-llms__subtitle">
            Configure pre-assigned AI models used by specific agents. You will be able
            to configure each agent individually in the Staff section if needed.
        </p>
    </header>

    @for (section of sections; track section.id) {
        <div class="default-llms__section">
            <div class="default-llms__section-title">{{ section.title }}</div>
            <div class="default-llms__grid">
                @for (card of section.cards; track card.id) {
                    <app-default-llms-card
                        [card]="card"
                        [selectedConfigId]="getSelectedConfigId(card)"
                        (modelSelected)="onModelSelected($event)"
                    ></app-default-llms-card>
                }
            </div>
        </div>
    }
</section>
