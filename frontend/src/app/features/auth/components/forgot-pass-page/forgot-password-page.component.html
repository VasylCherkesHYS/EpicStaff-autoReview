<div class="page">
    @if (state() === 'request') {
        <div class="card">
            <app-svg-icon
                icon="logo"
                size="120px"
            />

            <div class="title-section">
                <h1 class="title">Welcome to <span>EpicStaff</span></h1>
                <p class="subtitle">Reset your password</p>
            </div>

            <form
                class="form"
                (keydown.enter)="onRequestReset()"
            >
                <div>
                    <app-custom-input
                        label="Email"
                        placeholder="example@email.com"
                        [formControl]="emailControl"
                    />
                    <app-validation-errors [control]="emailControl" />
                    <p class="hint">We'll email you instructions to reset your password.</p>
                </div>
            </form>

            <app-button
                class="btn"
                [disabled]="loading() || emailControl.invalid"
                (click)="onRequestReset()"
            >
                Reset Password
            </app-button>
        </div>

        <p class="prompt">
            <span
                class="back-link"
                (click)="navToLogin()"
            >
                <app-svg-icon
                    icon="arrow-left"
                    size="18px"
                />
                Back to Login
            </span>
        </p>
    } @else {
        <div class="card compact">
            <app-svg-icon
                icon="logo"
                size="120px"
            />

            <div class="title-section">
                <h1 class="title">Check email</h1>
                <p class="subtitle">
                    We have sent the reset to<br />
                    <span class="email">{{ submittedEmail() }}</span>
                </p>
            </div>
        </div>

        <p class="prompt">
            <span
                class="back-link"
                (click)="navToLogin()"
            >
                <app-svg-icon
                    icon="arrow-left"
                    size="18px"
                />
                Back to Login
            </span>
        </p>
    }
</div>
