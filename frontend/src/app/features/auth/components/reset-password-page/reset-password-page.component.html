<div class="page">
    @switch (state()) {
        @case ('invalid-token') {
            <div class="card compact">
                <app-svg-icon
                    icon="logo"
                    size="120px"
                />

                <div class="title-section">
                    <h1 class="title">Link expired</h1>
                    <p class="subtitle">This password reset link is invalid or has expired.</p>
                </div>
            </div>

            <p class="prompt">
                <span
                    class="back-link"
                    (click)="navToLogin()"
                >
                    <app-svg-icon
                        icon="arrow-left"
                        size="18px"
                    />
                    Back to Login
                </span>
            </p>
        }

        @case ('set-password') {
            <div class="card">
                <app-svg-icon
                    icon="logo"
                    size="120px"
                />

                <div class="title-section">
                    <h1 class="title">Welcome to <span>EpicStaff</span></h1>
                    <p class="subtitle">Create new password</p>
                </div>

                <form
                    [formGroup]="form"
                    [appServerErrors]="form"
                    [errorsRef]="serverErrorsRef"
                    class="form"
                    (keydown.enter)="onSubmit()"
                >
                    <div>
                        <app-custom-input
                            label="Password"
                            type="password"
                            placeholder="Enter value..."
                            formControlName="new_password"
                        />
                        <app-validation-errors [control]="form.get('new_password')!" />
                    </div>

                    <app-password-strength [password]="password" />
                </form>

                <app-button
                    class="btn"
                    [disabled]="loading() || form.invalid"
                    (click)="onSubmit()"
                >
                    Save new password
                </app-button>
            </div>

            <p class="prompt">
                <span
                    class="back-link"
                    (click)="navToLogin()"
                >
                    <app-svg-icon
                        icon="arrow-left"
                        size="18px"
                    />
                    Back to Login
                </span>
            </p>
        }

        @case ('success') {
            <div class="card compact">
                <app-svg-icon
                    icon="logo"
                    size="100px"
                />
                <h1 class="title">Saved successfully!</h1>
            </div>

            <p class="prompt">
                <span
                    class="back-link"
                    (click)="navToLogin()"
                >
                    <app-svg-icon
                        icon="arrow-left"
                        size="18px"
                    />
                    Back to Login
                </span>
            </p>
        }
    }
</div>
