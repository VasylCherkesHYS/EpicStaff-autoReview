<div class="page">
    @if (state() === 'form') {
        <div class="card">
            <app-svg-icon
                icon="logo"
                size="120px"
            />

            <div class="title-section">
                <h1 class="title">Welcome to <span>EpicStaff</span></h1>
                <p class="subtitle">Create your account</p>
            </div>

            <form
                [formGroup]="form"
                class="form"
            >
                <div>
                    <app-custom-input
                        label="Email"
                        placeholder="example@email.com"
                        formControlName="email"
                    />
                    <app-validation-errors
                        [control]="form.get('email')!"
                        [serverError]="fieldErrors()['email']"
                    />
                </div>

                <div>
                    <app-custom-input
                        label="Password"
                        type="password"
                        placeholder="Enter password"
                        formControlName="password"
                    />
                    <app-validation-errors
                        [control]="form.get('password')!"
                        [serverError]="fieldErrors()['password']"
                    />
                    <app-password-strength [password]="password" />
                </div>
            </form>

            <div class="terms-row">
                <app-checkbox [formControl]="termsControl" />
                <p class="terms-text">
                    I agree to the
                    <span class="terms-link">Terms of Service</span>
                    and
                    <span class="terms-link">Privacy Policy</span>
                </p>
            </div>

            <app-button
                class="btn"
                [disabled]="form.invalid || !termsControl.value"
                (click)="onSubmit()"
            >
                Create account
            </app-button>
        </div>

        <p class="prompt">Already have an account? <span (click)="navToLogin()">Log in</span></p>
    } @else {
        <div class="card status">
            <app-svg-icon
                icon="logo"
                size="120px"
            />
            <p class="status-text">{{ state() === 'loading' ? 'Processing...' : 'Successfully' }}</p>
            <div
                class="status-indicator"
                [class.status-indicator--success]="state() === 'success'"
            >
                <div class="spinner-ring"></div>
                <div class="success-circle">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 14 14"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            d="M2 7L5.5 10.5L12 3.5"
                            stroke="white"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </div>
            </div>
        </div>
    }
</div>
