<div class="page">
    <div class="card">
        <app-svg-icon
            icon="logo"
            size="120px"
        />

        <div class="title-section">
            <h1 class="title">Welcome to <span>EpicStaff</span></h1>
            <p class="subtitle">Login to account</p>
        </div>

        <form
            [formGroup]="form"
            class="form"
            (keydown.enter)="onSubmit()"
        >
            <div>
                <app-custom-input
                    label="Email"
                    placeholder="example@gmail.com"
                    formControlName="email"
                />
                <app-validation-errors [control]="form.get('email')!" />
            </div>

            <div>
                <app-custom-input
                    label="Password"
                    type="password"
                    placeholder="Enter password"
                    formControlName="password"
                />
                <app-validation-errors [control]="form.get('password')!" />
            </div>

            <div class="remember-row">
                <app-checkbox formControlName="rememberMe" />
                <span class="remember-label">Remember me</span>
                <span class="forgot-label">Forgot?</span>
            </div>
        </form>

        @if (serverError() || throttleSecondsLeft() > 0) {
            <div class="server-error">
                @if (throttleSecondsLeft() > 0) {
                    Too many login attempts. Please try again in {{ throttleSecondsLeft() }}s.
                } @else {
                    {{ serverError() }}
                }
            </div>
        }

        <app-button
            class="btn"
            (click)="onSubmit()"
            [disabled]="loading || form.invalid || throttleSecondsLeft() > 0"
        >
            Login
        </app-button>
    </div>

    <p class="prompt">Don’t have an account yet? <span (click)="navToSignUp()">Sign Up</span></p>
</div>
