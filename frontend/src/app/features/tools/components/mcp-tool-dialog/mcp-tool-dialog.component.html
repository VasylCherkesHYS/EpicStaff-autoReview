<div class="mcp-tool-dialog">
    <div class="mcp-tool-dialog__header">
        <h2 class="mcp-tool-dialog__title">
            {{ isEditMode ? 'Edit MCP Tool' : 'Add MCP Tool' }}
        </h2>

        <app-icon-button
            icon="x"
            ariaLabel="Close dialog"
            size="2rem"
            (onClick)="onCancel()"
        ></app-icon-button>
    </div>

    <form
        [formGroup]="form"
        class="mcp-tool-dialog__form"
    >
        <div class="mcp-tool-dialog__body">
            @if (backendErrorMessage) {
                <div class="mcp-tool-dialog__error-banner">
                    <app-svg-icon
                        icon="alert-circle"
                        size="20px"
                    />
                    <span>{{ backendErrorMessage }}</span>
                </div>
            }
            <div>
                <app-custom-input
                    label="Name"
                    placeholder="Enter unique name for MCP configuration"
                    tooltipText="Unique identifier for this MCP tool configuration"
                    [required]="true"
                    formControlName="name"
                />
                <app-validation-errors [control]="form.get('name')!" />
            </div>

            <div>
                <app-custom-input
                    label="Transport"
                    placeholder="https://mcp-server.example.com/sse"
                    tooltipText="URL of the remote MCP server using Server-Sent Events (SSE) protocol"
                    [required]="true"
                    formControlName="transport"
                />
                <app-validation-errors [control]="form.get('transport')!" />
            </div>

            <div>
                <app-custom-input
                    label="Tool Name"
                    placeholder="Name of the MCP tool"
                    tooltipText="The specific tool name as registered on the MCP server"
                    [required]="true"
                    formControlName="tool_name"
                />
                <app-validation-errors [control]="form.get('tool_name')!" />
            </div>

            <div>
                <app-input-number
                    label="Timeout (seconds)"
                    placeholder="30"
                    tooltipText="Maximum time in seconds to wait for a request response. Leave empty for default timeout."
                    formControlName="timeout"
                    [min]="1"
                    [max]="2147483647"
                />
                <app-validation-errors [control]="form.get('timeout')!" />
            </div>

            <div>
                <app-custom-input
                    label="Auth"
                    placeholder="Bearer token or OAuth string (optional)"
                    tooltipText="Authorization token, API key, or OAuth string for authenticating with the MCP server"
                    formControlName="auth"
                />
                <app-validation-errors [control]="form.get('auth')!" />
            </div>

            <div>
                <app-input-number
                    label="Init Timeout (seconds)"
                    placeholder="30"
                    tooltipText="Maximum time in seconds to wait for session initialization. Default is 10 seconds."
                    formControlName="init_timeout"
                    [min]="1"
                    [max]="2147483647"
                />
                <app-validation-errors [control]="form.get('init_timeout')!" />
            </div>
        </div>
    </form>

    <div class="mcp-tool-dialog__footer">
        <app-button
            type="outline-primary"
            (click)="onCancel()"
            >Cancel</app-button
        >
        <app-button
            type="primary"
            [disabled]="form.invalid || form.pending"
            (click)="onSave()"
        >
            {{ isEditMode ? 'Update' : 'Create' }}
        </app-button>
    </div>
</div>
