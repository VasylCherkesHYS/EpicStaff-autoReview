<div class="tool-card">
    <div
        class="built-in-badge"
        [style.display]="tool.built_in ? 'block' : 'none'"
    >
        Built in
    </div>
    <div class="tool-header">
        <div class="tool-icon">
            <app-svg-icon
                icon="python"
                size="35px"
            />
        </div>
        <div class="tool-info">
            <div class="tool-name">{{ tool.name }}</div>
            <div class="tool-type">python</div>
        </div>
    </div>

    <div class="tool-description">{{ tool.description }}</div>

    <div class="tool-footer">
        <app-button
            type="ghost"
            (click)="onConfigure()"
            >Configure</app-button
        >
        <div class="footer-actions">
            <app-toggle-switch
                [checked]="enabled"
                (checkedChange)="onToggle($event)"
            ></app-toggle-switch>
            <button
                class="star-btn"
                aria-label="Favorite"
                (click)="onStar()"
                [class.active]="starred"
            >
                <app-svg-icon
                    [icon]="starIcon"
                    size="1.2rem"
                />
            </button>
            <button
                class="delete-btn"
                aria-label="Delete tool"
                (click)="onDelete()"
            >
                <app-svg-icon
                    icon="x"
                    size="1.2rem"
                />
            </button>
        </div>
    </div>
</div>
