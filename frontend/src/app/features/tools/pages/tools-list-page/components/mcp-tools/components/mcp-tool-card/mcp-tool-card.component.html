<div class="tool-card">
    <div class="tool-header">
        <div class="tool-icon">
            <app-svg-icon icon="hub" size="24px" />
        </div>
        <div class="tool-info">
            <div class="tool-name">{{ tool.name }}</div>
            <div class="tool-type">MCP • {{ tool.tool_name }}</div>
        </div>
    </div>

    <div class="tool-description">
        <div class="transport-info">
            <span class="label">Transport:</span>
            <span class="value">{{ tool.transport }}</span>
        </div>
        @if (tool.timeout) {
            <div class="timeout-info">
                <span class="label">Timeout:</span>
                <span class="value">{{ tool.timeout }}s</span>
            </div>
        }
    </div>

    <div class="tool-footer">
        <app-button type="ghost" (click)="onConfigure()">Configure</app-button>
        <div class="footer-actions">
            <app-toggle-switch [checked]="enabled" (checkedChange)="onToggle($event)"></app-toggle-switch>
            <button class="star-btn" aria-label="Favorite" (click)="onStar()" [class.active]="starred">
                <app-svg-icon [icon]="starIcon" size="1.2rem" />
            </button>
            <button class="delete-btn" aria-label="Delete tool" (click)="onDelete()">
                <app-svg-icon icon="x" size="1.2rem" />
            </button>
        </div>
    </div>
</div>
