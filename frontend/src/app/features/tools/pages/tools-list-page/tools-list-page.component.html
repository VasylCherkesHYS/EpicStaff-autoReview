<div class="tools-page">
  <div class="tools-page__header">
    <header class="tools-page__top">
      <div class="tools-page__title-wrapper">
        <h1 class="tools-page__title">
          Tools
          <span class="tools-page__subtitle">
            Manage your built-in and custom tools here.
          </span>
        </h1>
      </div>
      <div class="tools-page__actions">
        <app-button
          type="primary"
          [leftIcon]="createButtonIcon"
          (click)="onCreateToolClick()"
        >
          {{ createButtonLabel }}
        </app-button>
      </div>
    </header>

    <nav class="tools-page__tabs">
      <div class="tools-page__tabs-left">
        @for (tab of tabs; track tab.link) {
          <app-tab-button
            [routerLink]="tab.link"
            routerLinkActive="active"
            #rla="routerLinkActive"
            [active]="rla.isActive"
          >
            {{ tab.label }}
          </app-tab-button>
        }
      </div>
      <div class="tools-page__tabs-right">
        <div class="tools-page__search">
          <app-icon icon="ui/search" class="tools-page__search-icon" size="1.1rem"></app-icon>
          <input
            type="text"
            class="tools-page__search-input"
            placeholder="Search tools..."
            [ngModel]="searchTerm()"
            (ngModelChange)="onSearchTermChange($event)"
          />
          @if (searchTerm()) {
            <button type="button" class="tools-page__search-clear" aria-label="Clear" (click)="clearSearch()">
              <app-icon icon="ui/x" size="1.1rem"></app-icon>
            </button>
          }
        </div>
      </div>
    </nav>
  </div>

  <section class="tools-page__content">
    <router-outlet></router-outlet>
  </section>
</div>
