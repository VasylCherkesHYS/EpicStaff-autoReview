<div class="tool-card" [class.disabled]="!tool.enabled">
  <div class="tool-card__header">
    <div class="tool-card__icon">
      <app-icon [icon]="getIconName()" size="35"></app-icon>
    </div>
    <div class="tool-card__info">
      <div class="tool-card__name">{{ tool.name }}</div>
      <div class="tool-card__provider">by {{ provider }}</div>
    </div>
  </div>
  <div class="tool-card__description">{{ toolDescription }}</div>
  <div class="tool-card__footer">
    <app-button type="ghost" (click)="onConfigure()">Configure</app-button>
    <div class="tool-card__footer-actions">
      <app-toggle-switch
        [checked]="tool.enabled"
        (checkedChange)="onToggle($event)"
      ></app-toggle-switch>
    </div>
  </div>
</div>
