<form [formGroup]="strategyForm">
    <div
        class="config__grid config__grid--pt-0"
        formGroupName="mainParams"
    >
        <div class="config__grid-item">
            <label>Chunk Size</label>
            <app-help-tooltip
                class="config__tooltip"
                text="The maximum size of each document chunk. Smaller chunks are more precise but may lose context. Larger chunks preserve more context but may be less precise."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item config__grid-item--short">
            <app-input-number
                formControlName="chunk_size"
                [alwaysShowSteps]="true"
                [invalid]="!!getMainParamControl('chunk_size')?.invalid"
            />
            <app-validation-errors [control]="getMainParamControl('chunk_size')!" />
        </div>

        <div class="config__grid-item">
            <label>Chunk Overlap</label>
            <app-help-tooltip
                class="config__tooltip"
                text="The number of characters or tokens that overlap between chunks. Helps maintain context between chunks. Must be smaller than chunk size."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item config__grid-item--short">
            <app-input-number
                formControlName="chunk_overlap"
                [alwaysShowSteps]="true"
                [invalid]="!!getMainParamControl('chunk_overlap')?.invalid"
            />
            <app-validation-errors [control]="getMainParamControl('chunk_overlap')!" />
        </div>
    </div>

    <span class="config__divider"></span>

    <div
        class="config__grid"
        formGroupName="additionalParams"
    >
        <span class="config__grid-item">Additional parameters</span>
        <span class="config__grid-item"></span>

        <div class="config__grid-item">
            <label>Preserve Links</label>
            <app-help-tooltip
                class="config__tooltip"
                text="Keeps hyperlinks in the extracted content instead of removing them. Useful when link references provide important context."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item">
            <app-toggle-switch formControlName="preserve_links" />
        </div>
        <div class="config__grid-item">
            <label>Normalize Text</label>
            <app-help-tooltip
                class="config__tooltip"
                text="Cleans and standardizes extracted text by removing extra whitespace, formatting inconsistencies, and HTML artifacts."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item">
            <app-toggle-switch formControlName="normalize_text" />
        </div>
        <div class="config__grid-item">
            <label>External Metadata</label>
            <app-help-tooltip
                class="config__tooltip"
                text="Additional metadata provided as a JSON object. This metadata will be attached to each generated chunk."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item">
            <app-json-editor
                class="config__external-metadata"
                [editorOptions]="editorOptions"
                [jsonData]="jsonData"
                [title]="'JSON'"
                [allowCopy]="true"
                [fullHeight]="true"
                (jsonChange)="onJsonChange($event)"
            ></app-json-editor>
        </div>

        <div class="config__grid-item">
            <label>Denylist Tags</label>
            <app-help-tooltip
                class="config__tooltip"
                text="A list of HTML tags to exclude from processing (e.g., script, style). Content inside these tags will be removed before chunking."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item">
            <app-custom-input
                class="config__input"
                formControlName="denylist_tags"
                type="text"
                placeholder="Enter tag (e.g. h1, p, div)"
            />
        </div>
    </div>
</form>
