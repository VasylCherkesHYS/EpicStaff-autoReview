<div class="config">
    <div class="config__grid config__strategy-select">
        <div class="config__grid-item">
            <label>Chunk Strategy</label>
            <app-help-tooltip
                class="config__tooltip"
                text="Choose how to split your document into chunks. Different strategies work better for different document types."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item config__grid-item--short">
            <app-select
                [selectedValue]="selectedStrategy()"
                [items]="chunkStrategySelectItems"
                (changed)="onSelectedStrategyChange($event)"
            />
        </div>
    </div>

    @if (formComponent()) {
        <ng-container
            [ngComponentOutlet]="formComponent()"
            [ngComponentOutletInputs]="componentInputs()"
        ></ng-container>
    }
</div>
