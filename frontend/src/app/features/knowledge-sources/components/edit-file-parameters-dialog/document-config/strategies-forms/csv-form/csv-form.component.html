<form [formGroup]="strategyForm">
    <span class="config__divider"></span>

    <div class="config__grid" formGroupName="additionalParams">
        <span class="config__grid-item">Additional parameters</span>
        <span class="config__grid-item"></span>

        <div class="config__grid-item">
            <label>Rows In Chunk</label>
            <app-help-tooltip
                class="config__tooltip"
                text="The number of CSV rows included in each chunk. Larger values preserve more tabular context, while smaller values create more granular chunks."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item config__grid-item--short">
            <app-input-number formControlName="rows_in_chunk" />
        </div>

        <div class="config__grid-item">
            <label>Headers level</label>
            <app-help-tooltip
                class="config__tooltip"
                text="The number of header rows to include with each chunk. Ensures column context is preserved when splitting large CSV files."
                position="right"
                tooltipClass="dialog__label-tooltip"
            />
        </div>
        <div class="config__grid-item config__grid-item--short">
            <app-input-number formControlName="headers_level" />
        </div>
    </div>
</form>
