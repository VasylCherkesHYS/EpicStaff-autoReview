<div
    class="rag"
    [class.rag--selected]="selected()"
>
    <div class="rag__header">
        <app-icon
            [icon]="ragType().icon"
            [size]="'40px'"
        />
        <div class="rag__header-level">
            <p class="rag__level">{{ ragType().level }}</p>
            <div class="rag__stars">
                <app-icon
                    [icon]="'ui/star-filled'"
                    [size]="'20px'"
                />
                <app-icon
                    [icon]="ragType().stars >= 2 ? 'ui/star-filled' : 'ui/star'"
                    [size]="'20px'"
                />
                <app-icon
                    [icon]="ragType().stars >= 3 ? 'ui/star-filled' : 'ui/star'"
                    [size]="'20px'"
                />
            </div>
        </div>
    </div>
    <h4 class="rag__name">
        {{ragType().name}}
    </h4>
    <span class="rag__description">
        {{ragType().description}}
    </span>
    <p class="rag__tip">
        {{ragType().tip}}
    </p>
</div>
