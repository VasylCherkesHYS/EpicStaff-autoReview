<div class="table__wrapper">
    <!-- HEADER ROW -->
    <div
        class="table__row table__header"
        [style]="{'margin-bottom': bulkEditing() ? '0.25rem' : '0.5rem'}"
    >
        <!-- 1. Checkbox -->
        <div class="table__col" (click)="toggleAll()">
            <app-checkbox
                [checked]="allSelected()"
                [indeterminate]="indeterminate()"
            />
        </div>

        <!-- 2. Files (sortable dropdown) -->
        <div class="table__col">
            <app-multi-select
                icon="ui/filter-rows"
                label="FILES"
                searchPlaceholder="Search headers..."
                [items]="fileTypeSelectItems"
                (selectionChange)="filesFilter.set($event)"
            />
        </div>

        <!-- 3. Chunk Strategy -->
        <div class="table__col">
            <app-multi-select
                icon="ui/filter-rows"
                label="CHUNK STRATEGY"
                searchPlaceholder="Search headers..."
                [items]="chunkStrategySelectItems"
                (selectionChange)="chunkStrategyFilter.set($event)"
            />
        </div>

        <!-- 4. Chunk Size (sortable) -->
        <div class="table__col table__col--clickable" (click)="sortBy('chunk_size')">
            CHUNK SIZE
            <app-icon
                class="table__sort-icon"
                [class.table__sort-icon--active]="sort()?.column === 'chunk_size' && sort()?.dir === 'desc'"
                size="1rem"
                [icon]="'ui/arrow-up'"
            />
        </div>

        <!-- 5. Overlap (sortable) -->
        <div class="table__col table__col--clickable" (click)="sortBy('chunk_overlap')">
            OVERLAP
            <app-icon
                class="table__sort-icon"
                [class.table__sort-icon--active]="sort()?.column === 'chunk_overlap' && sort()?.dir === 'desc'"
                size="1rem"
                [icon]="'ui/arrow-up'"
            />
        </div>

        <!-- 6. Empty -->
        <div class="table__col"></div>
    </div>

    <!-- BULK EDIT ROW (visible when >1 selected) -->
    @if (bulkEditing()) {
        <div class="table__row table__bulk-row">
            <div class="table__col"></div>
            <div class="table__col">For selected:</div>

            <div class="table__col">
                <app-select
                    mod="small"
                    [items]="[]"
                />
            </div>

            <div class="table__col">
                <app-input
                    type="number"
                    mod="small"
                />
            </div>

            <div class="table__col">
                <app-input
                    type="number"
                    mod="small"
                />
            </div>

            <div class="table__col">
                <app-button
                    class="table__col-btn"
                    type="outline-primary"
                    mod="small"
                    (click)="bulkEditApply()"
                >
                    Apply
                </app-button>
            </div>
        </div>
    }

    <!-- DATA ROWS -->
    <div class="table__files-wrapper">
        <ol class="table__rows">
            @for (document of filteredAndSorted(); track document.naive_rag_document_id; let odd = $odd; let i = $index) {
                <li
                    class="table__row"
                    [class.table__row--dark]="odd"
                >
                    <!-- checkbox -->
                    <div class="table__col">
                        <app-checkbox
                            [checked]="document.selected"
                            (changed)="toggleDocument(document)"
                        />
                    </div>

                    <!-- filename -->
                    <div class="table__col table__col-file">
                        <span>{{ i + 1 }}</span>
                        <app-icon
                            class="table__file-icon"
                            icon="ui/document"
                            size="0.75rem"
                        />
                        <span class="table__file-name">
                        {{ document.file_name }}
                    </span>
                    </div>

                    <!-- strategy select -->
                    <div class="table__col">
                        <app-select
                            mod="small"
                            [items]="chunkStrategySelectItems"
                            [selectedValue]="document.chunk_strategy"
                            (changed)="docChunkStrategyChange(document, $event)"
                        />
                    </div>

                    <!-- chunk size -->
                    <div class="table__col">
                        <app-input
                            type="number"
                            mod="small"
                            [value]="document.chunk_size"
                            (changed)="docChunkSizeChange(document, $event)"
                        />
                    </div>

                    <!-- overlap -->
                    <div class="table__col">
                        <app-input
                            type="number"
                            mod="small"
                            [value]="document.chunk_overlap"
                            (changed)="docOverlapChange(document, $event)"
                        />
                    </div>

                    <!-- action button -->
                    <div class="table__col">
                        <app-button
                            class="table__col-btn"
                            type="outline-secondary"
                            mod="small"
                            (click)="tuneChunk(document.naive_rag_document_id)"
                        >
                            Tune Chunks
                        </app-button>
                    </div>
                </li>
            }
        </ol>

    </div>
</div>
