<div class="collections-page">
    <app-page-header
        headerTitle="Knowledge Sources"
        [showCreate]="false"
        [showFavoriteToggle]="false"
        [showSearch]="false"
        [showFilter]="false"
        [showSort]="false"
    ></app-page-header>

    <div class="collections-page__body">
        @if (isLoading()) {
            <div class="collections-page__body-loading">
                <app-spinner
                    [text]="'Loading knowledge sources...'"
                    [accentColor]="'#6562f5'"
                    [isOverlay]="false"
                ></app-spinner>
            </div>
        } @else {
            <div class="collections-page__sidebar">
                <app-collections-list-sidebar
                    [collections]="collections()"
                    (onCreateCollection)="createCollection()"
                    [(selectedCollectionId)]="selectedCollectionId"
                />
            </div>

            <div class="collections-page__content">
                <app-collection-details [selectedCollectionId]="selectedCollectionId()" />
            </div>
        }
    </div>
</div>
