<div class="dialog-container">
    <div class="dialog-header">
        <h2 class="dialog-title">Create Version</h2>
        <button
            class="close-button"
            (click)="onCancel()"
        >
            <app-svg-icon
                icon="x"
                size="20px"
            ></app-svg-icon>
        </button>
    </div>

    <div class="dialog-divider"></div>

    <div class="dialog-content">
        <form [formGroup]="form">
            <div class="form-group">
                <label for="versionName"> Version Name <span class="required">*</span> </label>
                <input
                    type="text"
                    id="versionName"
                    formControlName="name"
                    class="form-control"
                    [class.form-control--error]="form.get('name')?.invalid && form.get('name')?.touched"
                    placeholder="Enter value"
                    autocomplete="off"
                />
                @if (form.get('name')?.touched) {
                    @if (form.get('name')?.hasError('required')) {
                        <div class="error-message">Version name is required.</div>
                    } @else if (form.get('name')?.hasError('maxlength')) {
                        <div class="error-message">Max length is 255 characters.</div>
                    }
                }
            </div>

            <div class="form-group">
                <label for="versionDescription">Description</label>
                <textarea
                    id="versionDescription"
                    formControlName="description"
                    class="form-control"
                    placeholder="Enter Version description (optional)"
                    rows="4"
                ></textarea>
            </div>
        </form>
    </div>

    <div class="dialog-divider"></div>

    <div class="dialog-footer">
        <app-button
            type="ghost"
            (click)="onCancel()"
            >Cancel</app-button
        >
        <app-button
            type="primary"
            [disabled]="form.invalid"
            (click)="onSubmit()"
            >Create</app-button
        >
    </div>
</div>
