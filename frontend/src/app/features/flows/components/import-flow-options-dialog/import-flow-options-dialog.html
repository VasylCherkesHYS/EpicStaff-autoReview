<div class="dialog-container">
    <div class="dialog-header">
        <h2 class="dialog-title">Import Flow</h2>
    </div>
    <div class="dialog-content">
        <div class="option-row">
            <span class="option-label">
                Preserve Flow UUIDs
                <app-help-tooltip
                    size="0.875rem"
                    class="help-icon"
                    text="Maintaining UUIDs lets imported flows use the same IDs as the original system"
                    position="right"
                />
            </span>
            <div
                class="toggle-group"
                (click)="preserveUuids.set(!preserveUuids())"
            >
                <div
                    class="toggle-slider"
                    [class.right]="preserveUuids()"
                ></div>
                <button
                    type="button"
                    class="toggle-btn"
                    [class.text-active]="!preserveUuids()"
                >
                    No
                </button>
                <button
                    type="button"
                    class="toggle-btn"
                    [class.text-active]="preserveUuids()"
                >
                    Yes
                </button>
            </div>
        </div>
    </div>
    <div class="dialog-actions">
        <app-button
            type="ghost"
            (click)="cancel()"
            >Cancel</app-button
        >
        <app-button
            type="primary"
            (click)="confirm()"
            >Import</app-button
        >
    </div>
</div>
