<div class="dialog-container">
<div class="dialog-header">
  <h2 class="dialog-title">{{ dialogTitle }}</h2>
  <button class="close-button" (click)="onCancel()" [disabled]="isSubmitting">
    <app-svg-icon icon="x" size="14px"></app-svg-icon>
  </button>
</div>

    <div class="dialog-content">
        <form [formGroup]="flowForm">
            <!-- Name field with icon selector -->
            <div class="form-group name-with-icon">
                <label for="name">Flow Name <span class="required">*</span></label>
                <div class="input-with-icon">
                    <!-- Icon Picker Component -->
                    <!-- <app-icon-picker
              [selectedIcon]="selectedIcon"
              (iconSelected)="onIconSelected($event)"
            ></app-icon-picker> -->
                    <input
                        type="text"
                        id="name"
                        formControlName="name"
                        placeholder="Enter flow name"
                        class="form-control"
                    />
                </div>
                @if (flowForm.get('name')?.invalid && flowForm.get('name')?.touched) {
                    <div class="error-message">Flow name is required.</div>
                }
            </div>

            <div class="form-group">
                <label>Labels</label>
                <app-label-dropdown
                    [selectedLabelIds]="flowForm.get('label_ids')?.value || []"
                    (selectionChange)="flowForm.get('label_ids')?.setValue($event)"
                ></app-label-dropdown>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea
                    id="description"
                    formControlName="description"
                    placeholder="Enter flow description (optional)"
                    class="form-control"
                    rows="3"
                ></textarea>
            </div>
        </form>
        @if (errorMessage) {
            <div class="dialog-error-message">{{ errorMessage }}</div>
        }
    </div>

    <div class="dialog-footer">
        <app-button type="ghost" (click)="onCancel()" [disabled]="isSubmitting"> Cancel </app-button>
        <app-button type="primary" [disabled]="!flowForm.valid || isSubmitting" (click)="onSubmit()">
            @if (isSubmitting) {
                <span class="spinner"></span> Save
            } @else {
                {{ submitButtonText }}
            }
        </app-button>
    </div>
</div>
