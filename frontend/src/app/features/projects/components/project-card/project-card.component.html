<div class="project-card" (click)="cardClick.emit()">
  <div class="project-card__header">
    <div class="project-card__icon">
      <app-icon icon="ui/project" size="20"></app-icon>
        </div>
    <div class="project-card__info">
      <h3 class="project-card__title">{{ project().name }}</h3>
      <div class="project-card__meta">
        <span>{{ project().process }}</span>
        <span class="project-card__meta-sep">~</span>
        <span>{{ project().agents.length }} {{ project().agents.length === 1 ? 'agent' : 'agents' }}</span>
        <span class="project-card__meta-sep">~</span>
        <span>{{ project().tasks.length }} {{ project().tasks.length === 1 ? 'task' : 'tasks' }}</span>
            </div>
        </div>
        <app-project-menu
      [isOpen]="isMenuOpenSig()"
            (menuToggle)="onMenuToggle($event)"
            (actionSelected)="onActionSelected($event)"
        ></app-project-menu>
    </div>
  <p class="project-card__description">
    {{ project().description || 'No description provided.' }}
  </p>
</div>
