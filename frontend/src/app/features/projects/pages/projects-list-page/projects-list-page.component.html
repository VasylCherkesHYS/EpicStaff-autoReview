<div class="projects-page">
  <div class="projects-page__header">
    <header class="projects-page__top">
      <div class="projects-page__title-wrapper">
        <h1 class="projects-page__title">
                    Templates
          <span class="projects-page__subtitle">
            A template is a workspace to organize your AI agents and tasks.
          </span>
                </h1>
            </div>
      <div class="projects-page__actions">
                <app-button
                    type="primary"
                    [leftIcon]="'ui/plus'"
                    (click)="openCreateProjectDialog()"
                >
                    Create template
                </app-button>
            </div>
        </header>

    <nav class="projects-page__tabs">
      <div class="projects-page__tabs-left">
                @for (tab of tabs; track tab.link) {
                <app-tab-button
            [routerLink]="tab.link"
                    routerLinkActive="active"
                    #rla="routerLinkActive"
                    [active]="rla.isActive"
                >
                    {{ tab.label }}
                </app-tab-button>
                }
            </div>
      <div class="projects-page__tabs-right">
        <div class="projects-page__search">
          <app-icon icon="ui/search" class="projects-page__search-icon" size="1.1rem"></app-icon>
          <input
            type="text"
            class="projects-page__search-input"
            placeholder="Search templates..."
            [value]="searchTerm()"
            (input)="onSearchChange($event)"
          />
          @if (searchTerm()) {
            <button type="button" class="projects-page__search-clear" aria-label="Clear" (click)="clearSearch()">
              <app-icon icon="ui/x" size="1.1rem"></app-icon>
            </button>
          }
        </div>
            </div>
        </nav>
    </div>

  <section class="projects-page__content">
        <router-outlet></router-outlet>
    </section>
</div>
