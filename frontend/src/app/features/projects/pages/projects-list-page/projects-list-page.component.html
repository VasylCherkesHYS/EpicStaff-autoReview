<div class="projects-list-page">
    <div class="sticky-header">
        <header class="header">
            <div
                class="header-titles"
                appHideInlineSubtitleOnOverflow
            >
                <h1 class="title">
                    Templates
                    <span class="subtitle-inline"
                        >A template is a reusable workspace blueprint for AI agents and tasks.</span
                    >
                </h1>
            </div>
            <div class="header-actions">
                <app-button
                    type="primary"
                    class="btn-primary create-btn"
                    [leftIcon]="'plus'"
                    (click)="openCreateTemplateDialog()"
                >
                    Create template
                </app-button>
            </div>
        </header>
        <nav class="tabs">
            <div class="tabs-right">
                <div class="search-container">
                    <app-svg-icon
                        icon="search"
                        class="search-icon"
                        size="1.1rem"
                    />
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Search templates..."
                        [(ngModel)]="searchTerm"
                        (ngModelChange)="onSearchTermChange($event)"
                    />
                    @if (searchTerm) {
                        <button
                            type="button"
                            class="clear-btn"
                            aria-label="Clear"
                            (click)="clearSearch()"
                        >
                            <app-svg-icon
                                icon="x"
                                size="1.1rem"
                            />
                        </button>
                    }
                </div>
            </div>
        </nav>
    </div>
    <section class="body">
        <app-templates-list></app-templates-list>
    </section>
</div>
